<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AAQ Staff Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,
#000000,
#1a1a1a,
#3b2a00,
#d4af37,
#3b2a00,
#000000);

background-size:400% 400%;
animation:bgMove 12s ease infinite;

min-height:100vh;

color:white;

padding:20px;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

background:rgba(255,255,255,0.08);

padding:20px;

border-radius:20px;

backdrop-filter:blur(12px);

gap:20px;

flex-wrap:wrap;

}

.logo{

width:90px;

}

.header-text h1{

font-size:30px;

margin-bottom:5px;

}

.header-text p{

color:#e5e7eb;

}

.user-box{

display:flex;

align-items:center;

gap:15px;

margin-left:auto;

}

.user-photo{

width:65px;

height:65px;

border-radius:50%;

border:3px solid white;

object-fit:cover;

}

.user-details h3{

font-size:18px;

margin-bottom:5px;

}

.user-details p{

font-size:14px;

margin-bottom:6px;

color:#e5e7eb;

}

.live-date{

font-size:13px;

line-height:1.6;

color:#f3f4f6;

}

.logout{

background:#dc2626;

padding:12px 20px;

border-radius:12px;

text-decoration:none;

color:white;

font-weight:bold;

transition:0.3s;

}

.logout:hover{

transform:scale(1.05);

}

.dashboard{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

}

.card{

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:25px;

backdrop-filter:blur(12px);

text-align:center;

transition:0.3s;

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

}

.card:hover{

transform:translateY(-6px);

}

.card h2{

margin-bottom:15px;

font-size:24px;

}

.card p{

margin-bottom:20px;

color:#e5e7eb;

}

.btn{

display:inline-block;

padding:12px 25px;

border-radius:12px;

text-decoration:none;

font-weight:bold;

color:white;

transition:0.3s;

}

.btn:hover{

transform:scale(1.05);

}

.attendance{

background:
linear-gradient(135deg,#16a34a,#166534);

}

.profile{

background:
linear-gradient(135deg,#2563eb,#1d4ed8);

}

.events{

background:
linear-gradient(135deg,#ca8a04,#a16207);

}

.reports{

background:
linear-gradient(135deg,#7c3aed,#5b21b6);

}

.idcard{

background:
linear-gradient(135deg,#dc2626,#991b1b);

}

@media(max-width:768px){

.header{

flex-direction:column;

text-align:center;

}

.user-box{

margin-left:0;

}

.header-text h1{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="header">

<div>

<img src="logo.png"
class="logo">

</div>

<div class="header-text">

<h1>AAQ Staff Dashboard</h1>

<p>
Welcome To Staff Management System
</p>

</div>

<div class="user-box">

<img src="https://i.imgur.com/6VBx3io.png"
class="user-photo">

<div class="user-details">

<h3 id="userName">
Staff User
</h3>

<p id="userRole">
Staff Panel
</p>

<div class="live-date">

<span id="liveDate"></span>

<br>

<span id="liveTime"></span
