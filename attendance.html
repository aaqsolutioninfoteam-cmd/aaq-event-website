<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Staff Attendance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#dbeafe,
#fef3c7,
#ffffff
);

min-height:100vh;

padding:20px;

color:#0f172a;

}

.container{

max-width:750px;

margin:auto;

}

.card{

background:white;

padding:35px;

border-radius:30px;

box-shadow:
0 10px 35px rgba(0,0,0,0.08);

text-align:center;

border:1px solid rgba(212,175,55,0.2);

}

.staff-photo{

width:130px;

height:130px;

border-radius:50%;

object-fit:cover;

border:5px solid #facc15;

margin-bottom:20px;

}

h1{

font-size:32px;

margin-bottom:10px;

}

.role{

color:#64748b;

margin-bottom:20px;

}

.live{

background:#f8fafc;

padding:15px;

border-radius:15px;

margin-bottom:25px;

font-size:15px;

line-height:1.8;

}

.status-box{

background:#ecfeff;

padding:20px;

border-radius:20px;

margin-bottom:25px;

}

.status-box h2{

margin-bottom:15px;

font-size:24px;

}

.status-box p{

margin-bottom:10px;

font-size:16px;

}

.btn-group{

display:flex;

gap:15px;

justify-content:center;

flex-wrap:wrap;

}

.in-btn,
.out-btn{

padding:15px 30px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:bold;

cursor:pointer;

color:white;

}

.in-btn{

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

}

.out-btn{

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

}

.success{

margin-top:20px;

font-size:18px;

font-weight:bold;

color:#16a34a;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img
id="staffPhoto"
src="https://i.imgur.com/6VBx3io.png"
class="staff-photo">

<h1 id="staffName">
Staff User
</h1>

<p
id="staffPosition"
class="role">

Staff Panel

</p>

<div class="live">

<div id="liveDate"></div>

<div id="liveTime"></div>

</div>

<div class="status-box">

<h2>
Today's Duty
</h2>

<p id="inTime">
IN Time :
--
</p>

<p id="outTime">
OUT Time :
--
</p>

<p id="totalHours">
Total Duty :
--
</p>

<p id="workStatus">
Status :
Not Started
</p>

</div>

<div class="btn-group">

<button
onclick="markIn()"
class="in-btn">

IN

</button>

<button
onclick="markOut()"
class="out-btn">

OUT

</button>

</div>

<div
id="success"
class="success">

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
query,
where,
updateDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const staffName =
localStorage.getItem(
"staffName"
) || "Staff User";

const staffPhoto =
localStorage.getItem(
"staffPhoto"
);

const staffPosition =
localStorage.getItem(
"staffPosition"
) || "Staff Panel";

document.getElementById(
"staffName"
).innerHTML =
staffName;

document.getElementById(
"staffPosition"
).innerHTML =
staffPosition;

if(staffPhoto){

document.getElementById(
"staffPhoto"
).src =
staffPhoto;

}

function updateDateTime(){

const now = new Date();

document.getElementById(
"liveDate"
).innerHTML =
"📅 " +
now.toLocaleDateString();

document.getElementById(
"liveTime"
).innerHTML =
"🕒 " +
now.toLocaleTimeString();

}

setInterval(updateDateTime,1000);

updateDateTime();

window.markIn =
async function(){

const now = new Date();

await addDoc(
collection(db,"attendance"),
{

staffName,
staffPhoto,
staffPosition,

date:
now.toLocaleDateString(),

inTime:
now.toLocaleTimeString(),

outTime:"",
totalHours:"",

status:"Working"

}
);

document.getElementById(
"inTime"
).innerHTML =
"IN Time : " +
now.toLocaleTimeString();

document.getElementById(
"workStatus"
).innerHTML =
"Status : Working";

document.getElementById(
"success"
).innerHTML =
"✅ IN Attendance Marked";

}

window.markOut =
async function(){

const today =
new Date().toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const querySnapshot =
await getDocs(q);

querySnapshot.forEach(async(item)=>{

const data =
item.data();

const outTime =
new Date();

const inDate =
new Date(
today + " " + data.inTime
);

const diff =
(outTime - inDate)
/ 1000 / 60 / 60;

const total =
diff.toFixed(1) + " Hours";

await updateDoc(
doc(db,"attendance",item.id),
{

outTime:
outTime.toLocaleTimeString(),

totalHours:
total,

status:
"Completed"

}
);

document.getElementById(
"outTime"
).innerHTML =
"OUT Time : " +
outTime.toLocaleTimeString();

document.getElementById(
"totalHours"
).innerHTML =
"Total Duty : " +
total;

document.getElementById(
"workStatus"
).innerHTML =
"Status : Duty Completed";

document.getElementById(
"success"
).innerHTML =
"✅ OUT Attendance Marked";

});

}

</script>

</body>

</html>
