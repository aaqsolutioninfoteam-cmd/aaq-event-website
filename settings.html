<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Live ERP Settings</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b,
#2563eb
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1200px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.title-box h1{

font-size:34px;

margin-bottom:5px;

}

.title-box p{

color:#dbeafe;

}

.back-btn{

padding:14px 24px;

border-radius:14px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));

gap:25px;

}

.card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:28px;

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:
0 10px 35px rgba(0,0,0,0.25);

}

.card h2{

margin-bottom:20px;

font-size:24px;

color:#facc15;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-size:15px;

color:#e2e8f0;

}

.input-group input,
.input-group select,
.input-group textarea{

width:100%;

padding:13px;

border:none;

border-radius:12px;

background:rgba(255,255,255,0.12);

color:white;

font-size:15px;

outline:none;

}

textarea{

height:120px;

resize:none;

}

.save-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}

.preview{

background:rgba(250,204,21,0.12);

padding:18px;

border-radius:16px;

line-height:1.8;

margin-top:15px;

border:1px solid rgba(250,204,21,0.3);

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="title-box">

<h1>
ERP Live Settings
</h1>

<p>
Realtime Dashboard Control System
</p>

</div>

<a href="admin.html"
class="back-btn">

Back To Admin

</a>

</div>

<div class="grid">

<!-- DUTY NOTICE -->

<div class="card">

<h2>
Duty Notification
</h2>

<div class="input-group">

<label>
Duty Date
</label>

<input
type="date"
id="dutyDate">

</div>

<div class="input-group">

<label>
Duty Start Time
</label>

<input
type="time"
id="dutyStart">

</div>

<div class="input-group">

<label>
Duty End Time
</label>

<input
type="time"
id="dutyEnd">

</div>

<div class="input-group">

<label>
Duty Message
</label>

<textarea
id="dutyMessage"
placeholder="Write duty message..."></textarea>

</div>

<div class="preview">

📅 Duty Notice Preview

<br><br>

🕒 Time :
09:00 AM To 06:00 PM

<br><br>

📢 Staff Duty Notification

</div>

<button
onclick="saveDutyNotice()"
class="save-btn">

Save Duty Notice

</button>

</div>

<!-- POPUP NOTICE -->

<div class="card">

<h2>
Popup Notification
</h2>

<div class="input-group">

<label>
Popup Title
</label>

<input
type="text"
id="popupTitle"
placeholder="Important Notice">

</div>

<div class="input-group">

<label>
Popup Message
</label>

<textarea
id="popupMessage"
placeholder="Write popup message..."></textarea>

</div>

<div class="input-group">

<label>
Popup Status
</label>

<select id="popupStatus">

<option>
Enabled
</option>

<option>
Disabled
</option>

</select>

</div>

<button
onclick="savePopup()"
class="save-btn">

Save Popup

</button>

</div>

<!-- ROLE CHANGE -->

<div class="card">

<h2>
Role Change
</h2>

<div class="input-group">

<label>
Staff Email
</label>

<input
type="email"
id="roleEmail"
placeholder="staff@email.com">

</div>

<div class="input-group">

<label>
Select Role
</label>

<select id="roleType">

<option>
STAFF
</option>

<option>
MANAGER
</option>

<option>
HR
</option>

<option>
ADMIN
</option>

</select>

</div>

<button
onclick="saveRole()"
class="save-btn">

Update Role

</button>

</div>

<!-- THEME -->

<div class="card">

<h2>
Theme Settings
</h2>

<div class="input-group">

<label>
Select Theme
</label>

<select id="themeSelect">

<option>
Blue Gold
</option>

<option>
Royal Blue
</option>

<option>
Navy Premium
</option>

<option>
Corporate Dark
</option>

</select>

</div>

<button
onclick="saveTheme()"
class="save-btn">

Apply Theme

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.saveDutyNotice =
async function(){

await addDoc(
collection(db,"dutyNotice"),
{

date:
document.getElementById(
"dutyDate"
).value,

start:
document.getElementById(
"dutyStart"
).value,

end:
document.getElementById(
"dutyEnd"
).value,

message:
document.getElementById(
"dutyMessage"
).value

}
);

alert("Duty Notice Saved");

}

window.savePopup =
async function(){

await addDoc(
collection(db,"popupNotice"),
{

title:
document.getElementById(
"popupTitle"
).value,

message:
document.getElementById(
"popupMessage"
).value,

status:
document.getElementById(
"popupStatus"
).value

}
);

alert("Popup Saved");

}

window.saveRole =
async function(){

await addDoc(
collection(db,"roles"),
{

email:
document.getElementById(
"roleEmail"
).value,

role:
document.getElementById(
"roleType"
).value

}
);

alert("Role Updated");

}

window.saveTheme =
async function(){

await addDoc(
collection(db,"themeSettings"),
{

theme:
document.getElementById(
"themeSelect"
).value

}
);

alert("Theme Applied");

}

</script>

</body>

</html>
