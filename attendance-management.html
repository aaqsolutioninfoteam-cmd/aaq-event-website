<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Attendance Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4318FF; --bg: #f4f7fe; --danger: #ee5d50; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; }
        .filter-bar { background: white; padding: 20px; border-radius: 12px; display: flex; gap: 15px; margin-bottom: 20px; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .table-container { background: white; padding: 20px; border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 13px; color: #666; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; }
        .missing-punch { background: #fff5f5; border-left: 4px solid var(--danger); }
        .btn-action { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; color: white; margin-right: 5px; }
        .btn-edit { background: var(--primary); }
    </style>
</head>
<body>

<div class="filter-bar">
    <select id="empCodeFilter" onchange="loadData()"><option value="">Select Employee Code</option></select>
    <button class="btn-action" style="background:#2d3748;" onclick="loadData()">Refresh Data</button>
</div>

<div class="table-container">
    <table id="attendanceTable">
        <thead>
            <tr>
                <th>Emp Code</th><th>Staff Name</th><th>Date</th><th>IN/OUT Time</th>
                <th>Location</th><th>Photos</th><th>Remarks</th><th>Audit Log</th><th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { /* APNA CONFIG YAHAN DAALEIN */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Yahan define karein kya current user Manager hai?
    const IS_MANAGER = true; 

    window.loadData = async function() {
        const qs = await getDocs(collection(db, "attendance"));
        const tbody = document.getElementById("tableBody");
        const empCodeFilter = document.getElementById("empCodeFilter").value;
        tbody.innerHTML = "";

        qs.forEach((d) => {
            const data = d.data();
            if(empCodeFilter && data.empCode !== empCodeFilter) return;

            const isMissing = !data.outTime;
            const row = document.createElement("tr");
            if(isMissing) row.className = "missing-punch";

            row.innerHTML = `
                <td>${data.empCode || '-'}</td>
                <td>${data.staffName || '-'}</td>
                <td>${data.date || '-'}</td>
                <td>${data.inTime || '--'} - ${data.outTime || '--'}</td>
                <td>Lat: ${data.inLat || '-'}, Lng: ${data.inLng || '-'}</td>
                <td><button onclick="alert('Photo Link: ${data.inPhoto}')">View</button></td>
                <td>${data.remarks || '-'}</td>
                <td style="font-size:10px;">By: ${data.editedBy || 'System'}<br>${data.editedOn || '-'}</td>
                <td>
                    ${IS_MANAGER ? `<button class="btn-action btn-edit" onclick="editEntry('${d.id}')">Edit</button>` : 'Locked'}
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    window.editEntry = async function(id) {
        // Edit ka Logic yahan aayega
        alert("Edit mode unlocked for: " + id);
    }

    loadData();
</script>
</body>
</html>
