
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Admin Attendance Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#e2e8f0,
#fef9c3,
#ffffff
);

min-height:100vh;

padding:20px;

color:#111827;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

gap:15px;

}

.header h1{

font-size:30px;

}

.back-btn{

padding:12px 20px;

border-radius:12px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:30px;

}

.stat-card{

background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,0.08);

text-align:center;

}

.stat-card h2{

font-size:35px;

margin-bottom:10px;

}

.attendance-list{

display:grid;

gap:20px;

}

.card{

background:white;

padding:20px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,0.08);

display:flex;

align-items:center;

gap:20px;

flex-wrap:wrap;

}

.photo{

width:80px;

height:80px;

border-radius:50%;

object-fit:cover;

border:3px solid #facc15;

}

.details{

flex:1;

}

.details h3{

margin-bottom:10px;

}

.details p{

margin-bottom:5px;

color:#475569;

}

.status{

padding:8px 14px;

border-radius:10px;

background:#22c55e;

color:white;

font-weight:bold;

}

</style>

</head>

<body>

<div class="header">

<h1>
Attendance Records
</h1>

<a href="admin.html"
class="back-btn">

Back

</a>

</div>

<div class="stats">

<div class="stat-card">

<h2 id="totalAttendance">
0
</h2>

<p>
Total Attendance
</p>

</div>

</div>

<div
id="attendanceList"
class="attendance-list">

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

async function loadAttendance(){

const querySnapshot =
await getDocs(
collection(db,"attendance")
);

let html = "";

let total = 0;

querySnapshot.forEach((docItem)=>{

const data =
docItem.data();

total++;

html += `

<div class="card">

<img
src="${
data.staffPhoto ||
'https://i.imgur.com/6VBx3io.png'
}"
class="photo">

<div class="details">

<h3>
${data.staffName}
</h3>

<p>
💼 ${data.staffPosition}
</p>

<p>
📅 ${data.date}
</p>

<p>
🕒 ${data.time}
</p>

</div>

<div class="status">

${data.status}

</div>

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML = html;

document.getElementById(
"totalAttendance"
).innerHTML = total;

}

loadAttendance();

</script>

</body>

</html>
