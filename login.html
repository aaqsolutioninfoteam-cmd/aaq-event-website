<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AAQ Login Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#000000,
#1a1a1a,
#3b2a00,
#d4af37,
#3b2a00,
#000000
);

background-size:400% 400%;

animation:bgMove 12s ease infinite;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.login-box{

width:100%;

max-width:400px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

color:white;

}

.logo{

width:100px;

margin-bottom:20px;

}

h1{

margin-bottom:10px;

font-size:30px;

}

.subtitle{

margin-bottom:25px;

color:#e5e7eb;

font-size:14px;

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#1f2937;

color:white;

font-size:16px;

}

.password-box{

position:relative;

}

.show-btn{

position:absolute;

right:15px;

top:15px;

cursor:pointer;

font-size:14px;

color:#facc15;

font-weight:bold;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:
linear-gradient(
135deg,
#ca8a04,
#a16207
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.03);

}

.forgot{

margin-top:15px;

font-size:14px;

color:#facc15;

cursor:pointer;

}

#error{

margin-top:15px;

color:#f87171;

font-size:14px;

}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.png"
class="logo">

<h1>AAQ Web App</h1>

<p class="subtitle">
Secure Staff & Admin Login
</p>

<input
type="email"
id="email"
placeholder="Enter Email">

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter Password">

<span
class="show-btn"
onclick="togglePassword()">

Show

</span>

</div>

<button onclick="login()">

Login

</button>

<div
class="forgot"
onclick="forgotPassword()">

Forgot Password?

</div>

<p id="error"></p>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b",

measurementId:
"G-HHD049KDS8"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.togglePassword =
function(){

const passwordInput =
document.getElementById(
"password"
);

if(
passwordInput.type === "password"
){

passwordInput.type = "text";

document.querySelector(
".show-btn"
).innerHTML = "Hide";

}else{

passwordInput.type = "password";

document.querySelector(
".show-btn"
).innerHTML = "Show";

}

}

window.forgotPassword =
function(){

const email =
document.getElementById(
"email"
).value;

if(!email){

alert(
"Please Enter Your Email First"
);

return;

}

alert(
"Password Reset Request Sent For : " + email
);

}

window.login =
async function(){

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

try{

if(

email ===
"aaqsolutioninfoteam@gmail.com"

||

email ===
"admin@aaq.com"

){

localStorage.setItem(
"loggedUser",
"Admin"
);

localStorage.setItem(
"currentUser",
JSON.stringify({
email:
email,
role:
"ADMIN"
})
);

window.location.href =
"admin.html";

return;

}

const querySnapshot =
await getDocs(
collection(db,"staffs")
);

let found = false;

let foundStaff = null;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(

data.email === email

&&

data.password === password

){

found = true;

foundStaff = data;

}

});

if(found){

localStorage.setItem(

"staffName",

foundStaff.staffName || "Staff"

);

localStorage.setItem(

"staffPhoto",

foundStaff.photoURL || ""

);

localStorage.setItem(

"loggedUser",

foundStaff.staffName || "Staff"

);

localStorage.setItem(

"currentUser",

JSON.stringify(foundStaff)

);

window.location.href =

"staff-dashboard.html";

}else{

document.getElementById(
"error"
).innerHTML =

"Invalid Email or Password";

}

}catch(error){

document.getElementById(
"error"
).innerHTML =

"Login Failed";

console.log(error);

}

}

</script>

</body>

</html>
