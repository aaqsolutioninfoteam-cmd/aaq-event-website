<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Events</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1300px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.back-btn{

padding:14px 24px;

border-radius:14px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.event-card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:25px;

margin-bottom:25px;

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.12);

}

.event-card h2{

color:#facc15;

margin-bottom:15px;

}

.event-card p{

margin-bottom:10px;

line-height:1.8;

}

.post-box{

background:rgba(255,255,255,0.06);

padding:18px;

border-radius:18px;

margin-top:18px;

border:1px solid rgba(255,255,255,0.08);

}

.post-box h3{

color:#facc15;

margin-bottom:12px;

}

.status{

display:inline-block;

padding:8px 15px;

border-radius:10px;

font-weight:bold;

margin-top:15px;

}

.active{

background:#22c55e;

}

.expired{

background:#ef4444;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>
My Events
</h1>

<p>
Assigned Event Duties
</p>

</div>

<a href="staff-dashboard.html"
class="back-btn">

Back To Dashboard

</a>

</div>

<div id="eventList"></div>

</div>

<script>

const currentUser =
JSON.parse(
localStorage.getItem("currentUser")
);

const staffEmail =
currentUser.email;

function loadEvents(){

const events =
JSON.parse(
localStorage.getItem("events")
) || [];

let html = "";

events.forEach((event)=>{

const today =
new Date().toISOString().split("T")[0];

const status =
today > event.endDate

?

"Expired"

:

"Active";

let matchedPosts = "";

event.posts.forEach((post)=>{

if(
post.staffEmails
.toLowerCase()
.includes(
staffEmail.toLowerCase()
)
){

matchedPosts += `

<div class="post-box">

<h3>
💼 ${post.crewPost}
</h3>

<p>
📍 Duty Area :
${post.dutyArea}
</p>

<p>
👨 Coordinator :
${post.coordinator}
</p>

<p>
👥 Assigned Staff :
${post.staffEmails}
</p>

</div>

`;

}

});

if(matchedPosts !== ""){

html += `

<div class="event-card">

<h2>
🎉 ${event.eventName}
</h2>

<p>
📍 Address :
${event.eventAddress}
</p>

<p>
📅 Event Validity :
${event.startDate}
To
${event.endDate}
</p>

<p>
👨 Event Coordinator :
${event.eventCoordinator}
</p>

<p>
🛡️ Access Manager :
${event.accessManager}
</p>

<p>
🖥️ Technical Team :
${event.technicalTeam}
</p>

${matchedPosts}

<div class="status ${status === "Active" ? "active" : "expired"}">

${status}

</div>

</div>

`;

}

});

document.getElementById(
"eventList"
).innerHTML =
html;

}

loadEvents();

</script>

</body>

</html>
