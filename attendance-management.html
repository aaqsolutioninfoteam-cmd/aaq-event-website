<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(
135deg,
#f8fafc,
#e0f2fe,
#fef9c3,
#ffffff
);
min-height:100vh;
padding:20px;
color:#0f172a;
}

.container{
max-width:1400px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.page-title{
font-size:32px;
font-weight:bold;
}

.back-btn{
padding:12px 20px;
border-radius:14px;
text-decoration:none;
font-weight:bold;
background:linear-gradient(
135deg,
#facc15,
#eab308
);
color:#111827;
}

.summary-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:25px;
}

.summary-card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:
0 10px 25px rgba(0,0,0,.08);
text-align:center;
}

.summary-card h1{
font-size:28px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="page-title">
Attendance Management V3
</div>

<a href="admin.html"
class="back-btn">

← Back

</a>

</div>

<div class="summary-grid">

<div class="summary-card">
<h3>Total Attendance</h3>
<h1 id="totalAttendance">0</h1>
</div>

<div class="summary-card">
<h3>Approved</h3>
<h1 id="approvedCount">0</h1>
</div>

<div class="summary-card">
<h3>Pending</h3>
<h1 id="pendingCount">0</h1>
</div>
  

<div class="summary-card">
<h3>Rejected</h3>
<h1 id="rejectedCount">0</h1>
</div>

<div class="summary-card">
<h3>Total Hours</h3>
<h1 id="totalHours">0</h1>
</div>

</div>

  <style>

.filter-section{

background:white;

padding:20px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

margin-bottom:25px;

display:flex;

gap:15px;

flex-wrap:wrap;

align-items:end;

}

.filter-box{

display:flex;

flex-direction:column;

gap:8px;

}

.filter-box input,
.filter-box select{

padding:12px;

border-radius:12px;

border:1px solid #cbd5e1;

min-width:180px;

}

.green-btn{

padding:12px 20px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

font-weight:bold;

cursor:pointer;

}

.attendance-list{

display:flex;

flex-direction:column;

gap:15px;

}

.hidden{
display:none;
}

</style>

<div class="filter-section">

<div class="filter-box">

<label>Date Filter</label>

<input
type="date"
id="filterDate">

</div>

<div class="filter-box">

<label>Month Filter</label>

<input
type="month"
id="filterMonth">

</div>

<div class="filter-box">

<label>Employee</label>

<select
id="employeeFilter">

<option value="">
All Employees
</option>

</select>

</div>

<div class="filter-box">

<label>Status</label>

<select
id="statusFilter">

<option value="">
All Status
</option>

<option value="Pending">
Pending
</option>

<option value="Approved">
Approved
</option>

<option value="Rejected">
Rejected
</option>

</select>

</div>

<div class="filter-box">

<label>Search Staff</label>

<input
type="text"
id="searchStaff">

</div>

<button
class="green-btn"
id="applyFilterBtn">

Apply Filter

</button>

<button
class="green-btn"
id="backDateBtn">

+ Back Date

</button>

</div>

<div
id="backDateForm"
class="hidden">

</div>

<div
id="attendanceList"
class="attendance-list">

</div>
<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
addDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

function calculateHours(
inTime,
outTime
){

if(
!inTime ||
!outTime
){

return 0;

}

const today =
new Date();

const inDate =
new Date(
today.toDateString()
+
" "
+
inTime
);

const outDate =
new Date(
today.toDateString()
+
" "
+
outTime
);

return (
(outDate - inDate)
/1000/60/60
).toFixed(2);

}

window.openBackDateForm =
function(){

const form =
document.getElementById(
"backDateForm"
);

form.classList.toggle(
"hidden"
);

};

async function loadEmployeeFilter(){

const querySnapshot =
await getDocs(
collection(
db,
"attendance"
)
);

const employeeFilter =
document.getElementById(
"employeeFilter"
);

let names = [];

querySnapshot.forEach(
(docItem)=>{

const data =
docItem.data();

if(
data.staffName &&
!names.includes(
data.staffName
)
){

names.push(
data.staffName
);

}

});

employeeFilter.innerHTML =

'<option value="">All Employees</option>';

names.sort().forEach(
(name)=>{

employeeFilter.innerHTML +=

`<option value="${name}">
${name}
</option>`;

});

}

window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(
db,
"attendance"
)
);

const selectedEmployee =
document.getElementById(
"employeeFilter"
).value;

const selectedStatus =
document.getElementById(
"statusFilter"
).value;

const searchStaff =
document.getElementById(
"searchStaff"
)
.value
.toLowerCase();

const selectedDate =
document.getElementById(
"filterDate"
).value;

const selectedMonth =
document.getElementById(
"filterMonth"
).value;

let totalAttendance = 0;
let approved = 0;
let pending = 0;
let rejected = 0;
let totalHours = 0;

let html = "";
  querySnapshot.forEach(
(docItem)=>{

const data =
docItem.data();

if(
selectedEmployee &&
data.staffName !== selectedEmployee
){
return;
}

if(
selectedStatus &&
data.status !== selectedStatus
){
return;
}

if(
searchStaff &&
!data.staffName
.toLowerCase()
.includes(searchStaff)
){
return;
}

if(selectedDate){

const filterDate =
new Date(selectedDate)
.toLocaleDateString();

if(data.date !== filterDate){
return;
}

}

if(selectedMonth){

const attendanceDate =
new Date(data.date);

const monthValue =
attendanceDate.getFullYear()
+
"-"
+
String(
attendanceDate.getMonth()+1
).padStart(2,"0");

if(
monthValue !==
selectedMonth
){
return;
}

}

totalAttendance++;

if(data.status==="Approved"){
approved++;
}
else if(data.status==="Rejected"){
rejected++;
}
else{
pending++;
}

totalHours += Number(
String(
data.totalHours || 0
)
.replace(
" Hours",
""
)
);

html += `

<div class="attendance-card">

<div class="staff-top">

<img
src="${
data.staffPhoto ||
'https://i.imgur.com/6VBx3io.png'
}"
class="staff-photo">

<div>

<h3>
${data.staffName}
</h3>

<p>
${data.staffPosition || '-'}
</p>

<p>
📅 ${data.date || '-'}
</p>

<p>
📊 ${data.status || 'Pending'}
</p>

</div>

</div>

<p>
🟢 IN :
${data.inTime || '--'}
</p>

<p>
🔴 OUT :
${data.outTime || '--'}
</p>

<p>
⏱ Total :
${data.totalHours || 'Working...'}
</p>
html += `

<div class="photo-grid">

<div>

<p>📷 IN Photo</p>

<img
src="${data.inPhoto || ''}"
class="evidence-photo">

</div>

<div>

<p>📷 OUT Photo</p>

<img
src="${data.outPhoto || ''}"
class="evidence-photo">

</div>

</div>

<br>

<p>
📍 IN :
${data.inLat || '-'},
${data.inLng || '-'}
</p>

<p>
📍 OUT :
${data.outLat || '-'},
${data.outLng || '-'}
</p>

<br>

<button
onclick="approveAttendance('${docItem.id}')"
class="action-btn approve-btn">

Approve

</button>

<button
onclick="rejectAttendance('${docItem.id}')"
class="action-btn reject-btn">

Reject

</button>

<button
onclick="deleteAttendance('${docItem.id}')"
class="action-btn delete-btn">

Delete

</button>

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML =
html;

document.getElementById(
"totalAttendance"
).innerHTML =
totalAttendance;

document.getElementById(
"approvedCount"
).innerHTML =
approved;

document.getElementById(
"pendingCount"
).innerHTML =
pending;

document.getElementById(
"rejectedCount"
).innerHTML =
rejected;

document.getElementById(
"totalHours"
).innerHTML =
totalHours.toFixed(2);

}

window.approveAttendance =
async function(id){

await updateDoc(
doc(db,"attendance",id),
{
status:"Approved"
}
);

loadAttendance();

}

window.rejectAttendance =
async function(id){

await updateDoc(
doc(db,"attendance",id),
{
status:"Rejected"
}
);

loadAttendance();

}

window.deleteAttendance =
async function(id){

if(
!confirm(
"Delete Attendance?"
)
){
return;
}

await deleteDoc(
doc(db,"attendance",id)
);

loadAttendance();

}

document
.getElementById(
"applyFilterBtn"
)
.addEventListener(
"click",
loadAttendance
);

loadEmployeeFilter();

loadAttendance();

  document.getElementById(
"backDateForm"
).innerHTML =

`

<div class="attendance-card">

<h2>
Back Date Attendance
</h2>

<br>

<input
type="text"
id="backStaff"
placeholder="Staff Name"
style="
width:100%;
padding:12px;
margin-bottom:10px;
">

<input
type="date"
id="backDate"
style="
width:100%;
padding:12px;
margin-bottom:10px;
">

<input
type="time"
id="backIn"
style="
width:100%;
padding:12px;
margin-bottom:10px;
">

<input
type="time"
id="backOut"
style="
width:100%;
padding:12px;
margin-bottom:10px;
">

<input
type="text"
id="backReason"
placeholder="Reason"
style="
width:100%;
padding:12px;
margin-bottom:10px;
">

<button
id="saveBackDateBtn"
class="green-btn">

Save Attendance

</button>

</div>

`;

document
.getElementById(
"saveBackDateBtn"
)
.addEventListener(
"click",
async()=>{

const staffName =
document.getElementById(
"backStaff"
).value;

const date =
document.getElementById(
"backDate"
).value;

const inTime =
document.getElementById(
"backIn"
).value;

const outTime =
document.getElementById(
"backOut"
).value;

const reason =
document.getElementById(
"backReason"
).value;

if(
!staffName ||
!date ||
!inTime ||
!outTime
){

alert(
"Fill All Fields"
);

return;

}

const totalHours =
calculateHours(
inTime,
outTime
);

await addDoc(
collection(
db,
"attendance"
),
{

staffName:
staffName,

date:
new Date(date)
.toLocaleDateString(),

inTime:
inTime,

outTime:
outTime,

totalHours:
totalHours +
" Hours",

status:
"Approved",

backDate:
true,

reason:
reason,

createdBy:
"Admin"

}
);

alert(
"Back Date Attendance Added"
);

document.getElementById(
"backStaff"
).value = "";

document.getElementById(
"backDate"
).value = "";

document.getElementById(
"backIn"
).value = "";

document.getElementById(
"backOut"
).value = "";

document.getElementById(
"backReason"
).value = "";

loadAttendance();

}
);

</script>

</body>

</html>
