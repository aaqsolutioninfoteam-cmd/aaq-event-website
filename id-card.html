<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
My Event ID Card
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.id-card{

width:100%;

max-width:390px;

background:rgba(255,255,255,0.08);

border-radius:30px;

padding:30px;

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.12);

text-align:center;

position:relative;

overflow:hidden;

box-shadow:
0 10px 35px rgba(0,0,0,0.35);

}

.top-line{

position:absolute;

top:0;
left:0;

width:100%;

height:8px;

background:
linear-gradient(
135deg,
#facc15,
#ca8a04
);

}

.logo{

width:85px;

margin-bottom:15px;

}

.title{

font-size:24px;

font-weight:bold;

margin-bottom:5px;

color:#facc15;

}

.sub{

font-size:13px;

margin-bottom:20px;

color:#cbd5e1;

}

.staff-photo{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #facc15;

margin-bottom:15px;

}

.name{

font-size:24px;

font-weight:bold;

margin-bottom:8px;

}

.position{

font-size:16px;

margin-bottom:15px;

color:#facc15;

}

.details{

text-align:left;

margin-top:20px;

line-height:2;

font-size:15px;

color:#e2e8f0;

}

.details span{

font-weight:bold;

color:white;

}

.qr{

margin-top:20px;

width:100px;

height:100px;

border-radius:12px;

background:white;

padding:5px;

}

.valid{

margin-top:15px;

font-size:14px;

color:#facc15;

font-weight:bold;

}

.btns{

display:flex;

gap:12px;

margin-top:20px;

}

.btn{

flex:1;

padding:13px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:bold;

color:white;

font-size:15px;

}

.print{

background:#2563eb;

}

.download{

background:#22c55e;

}

</style>

</head>

<body>

<div class="id-card">

<div class="top-line"></div>

<img
src="logo.png"
class="logo">

<div class="title">
AAQ EVENT PASS
</div>

<div class="sub">
Professional Event Duty Card
</div>

<img
id="staffPhoto"
src="https://i.imgur.com/6VBx3io.png"
class="staff-photo">

<div
class="name"
id="staffName">

Staff Name

</div>

<div
class="position"
id="staffPosition">

Position

</div>

<div class="details">

<div>

<span>
🪪 ID :
</span>

<span id="staffId">

AAQ-001

</span>

</div>

<div>

<span>
📱 Mobile :
</span>

<span id="staffMobile">

9876543210

</span>

</div>

<div>

<span>
🎉 Event :
</span>

<span id="eventName">

Event Name

</span>

</div>

<div>

<span>
📍 Event Address :
</span>

<span id="eventAddress">

Ahmedabad

</span>

</div>

<div>

<span>
💼 Crew Post :
</span>

<span id="crewPost">

Reception

</span>

</div>

<div>

<span>
📌 Duty Area :
</span>

<span id="dutyArea">

Main Gate

</span>

</div>

<div>

<span>
👨 Coordinator :
</span>

<span id="coordinator">

Coordinator

</span>

</div>

</div>

<div
class="valid"
id="validityDate">

📅 Valid Till : 25/05/2026

</div>

<img
id="qrCode"
class="qr">

<div class="btns">

<button
class="btn print"
onclick="window.print()">

Print

</button>

<button
class="btn download"
onclick="downloadCard()">

Download

</button>

</div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const currentUser =
JSON.parse(
localStorage.getItem("currentUser")
);

document.getElementById(
"staffPhoto"
).src =

currentUser?.photoURL ||
"https://i.imgur.com/6VBx3io.png";

document.getElementById(
"staffName"
).innerHTML =

currentUser?.staffName || "Staff";

document.getElementById(
"staffPosition"
).innerHTML =

currentUser?.position || "Staff";

document.getElementById(
"staffId"
).innerHTML =

currentUser?.staffId || "AAQ-001";

document.getElementById(
"staffMobile"
).innerHTML =

currentUser?.mobile || "0000000000";

document.getElementById(
"qrCode"
).src =

"https://api.qrserver.com/v1/create-qr-code/?size=120x120&data="

+

(currentUser?.email || "");

async function loadEvent(){

const querySnapshot =
await getDocs(
collection(db,"events")
);

querySnapshot.forEach((docItem)=>{

const event =
docItem.data();

(event.posts || []).forEach((post)=>{

const matched =
(post.staffEmails || []).some(

email =>

email
.toLowerCase()
.trim()

===

(currentUser?.email || "")
.toLowerCase()
.trim()

);

if(matched){

document.getElementById(
"eventName"
).innerHTML =

event.eventName || "";

document.getElementById(
"eventAddress"
).innerHTML =

event.eventAddress || "";

document.getElementById(
"crewPost"
).innerHTML =

post.crewPost || "";

document.getElementById(
"dutyArea"
).innerHTML =

post.dutyArea || "";

document.getElementById(
"coordinator"
).innerHTML =

post.coordinator || "";

document.getElementById(
"validityDate"
).innerHTML =

"📅 Valid Till : " +
(event.endDate || "");

}

});

});

}

function downloadCard(){

window.print();

}

window.downloadCard =
downloadCard;

loadEvent();

</script>

</body>

</html>
