<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My ID Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.id-card{

width:100%;

max-width:380px;

background:rgba(255,255,255,0.08);

border-radius:28px;

padding:30px;

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.12);

text-align:center;

}

.logo{

width:80px;

margin-bottom:15px;

}

.staff-photo{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #facc15;

margin-bottom:15px;

}

.id-card h2{

margin-bottom:8px;

color:#facc15;

}

.id-card p{

margin-bottom:8px;

line-height:1.7;

color:#e2e8f0;

}

.qr{

margin-top:15px;

width:90px;

}

.btns{

display:flex;

gap:12px;

margin-top:18px;

}

.btn{

flex:1;

padding:13px;

border:none;

border-radius:14px;

cursor:pointer;

font-weight:bold;

color:white;

}

.print{

background:#2563eb;

}

.download{

background:#22c55e;

}

</style>

</head>

<body>

<div class="id-card">

<img
src="logo.png"
class="logo">

<img
id="staffPhoto"
src="https://i.imgur.com/6VBx3io.png"
class="staff-photo">

<h2 id="staffName">
Staff User
</h2>

<p id="staffPosition">
Position
</p>

<p id="staffEmail">
Email
</p>

<p id="staffMobile">
Mobile
</p>

<p id="staffId">
ID Card
</p>

<p id="staffAddress">
Address
</p>

<img
id="qrCode"
class="qr">

<div class="btns">

<button
class="btn print"
onclick="window.print()">

Print

</button>

<button
class="btn download">

Download

</button>

</div>

</div>

<script>

const currentUser =
JSON.parse(
localStorage.getItem("currentUser")
);

document.getElementById(
"staffPhoto"
).src =

currentUser.photoURL ||
'https://i.imgur.com/6VBx3io.png';

document.getElementById(
"staffName"
).innerHTML =

currentUser.staffName;

document.getElementById(
"staffPosition"
).innerHTML =

"💼 " + currentUser.position;

document.getElementById(
"staffEmail"
).innerHTML =

"📧 " + currentUser.email;

document.getElementById(
"staffMobile"
).innerHTML =

"📱 " + currentUser.mobile;

document.getElementById(
"staffId"
).innerHTML =

"🪪 " + currentUser.staffId;

document.getElementById(
"staffAddress"
).innerHTML =

"📍 " + currentUser.address;

document.getElementById(
"qrCode"
).src =

"https://api.qrserver.com/v1/create-qr-code/?size=100x100&data="

+ currentUser.email;

</script>

</body>

</html>
