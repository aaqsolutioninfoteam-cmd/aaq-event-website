<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AAQ Login Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,
#000000,
#1a1a1a,
#3b2a00,
#d4af37,
#3b2a00,
#000000);

background-size:400% 400%;
animation:bgMove 12s ease infinite;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.login-box{

width:100%;
max-width:400px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

color:white;

}

.logo{

width:110px;
margin-bottom:20px;

}

h1{

margin-bottom:10px;
font-size:32px;

}

.subtitle{

margin-bottom:25px;
color:#e5e7eb;

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#1f2937;

color:white;

font-size:16px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:
linear-gradient(135deg,#ca8a04,#a16207);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.03);

}

#error{

margin-top:15px;
color:#f87171;

}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.png"
class="logo">

<h1>AAQ Web App</h1>

<p class="subtitle">
Secure Staff & Admin Login
</p>

<input type="email"
id="email"
placeholder="Enter Email">

<input type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<p id="error"></p>

</div>

<!-- FIREBASE SDK -->

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_AUTH_DOMAIN",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_STORAGE_BUCKET",

messagingSenderId: "YOUR_SENDER_ID",

appId: "YOUR_APP_ID"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.login = function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

const user = userCredential.user;

if(email === "admin@aaq.com"){

window.location.href = "admin.html";

}else{

window.location.href =
"staff-dashboard.html";

}

})

.catch((error)=>{

document.getElementById("error")
.innerText =
"Invalid Email or Password";

});

}

</script>

</body>

</html>
