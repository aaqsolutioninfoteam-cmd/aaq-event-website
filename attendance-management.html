<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Attendance Management V4
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#e0f2fe,
#fef9c3,
#ffffff
);

padding:20px;

color:#0f172a;

}

.container{

max-width:1600px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:20px;

flex-wrap:wrap;

gap:10px;

}

.back-btn{

padding:12px 20px;

border-radius:12px;

text-decoration:none;

background:#facc15;

font-weight:bold;

color:#111827;

}

.summary-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:15px;

margin-bottom:20px;

}

.summary-card{

background:white;

padding:20px;

border-radius:20px;

text-align:center;

box-shadow:
0 5px 15px rgba(0,0,0,.08);

}

.summary-card h1{

margin-top:10px;

}

.filter-section{

background:white;

padding:20px;

border-radius:20px;

margin-bottom:20px;

display:flex;

flex-wrap:wrap;

gap:10px;

align-items:end;

box-shadow:
0 5px 15px rgba(0,0,0,.08);

}

.filter-section input,
.filter-section select{

padding:12px;

border:1px solid #ddd;

border-radius:10px;

min-width:180px;

}

.green-btn{

padding:12px 18px;

border:none;

border-radius:10px;

cursor:pointer;

background:#22c55e;

color:white;

font-weight:bold;

}

.table-box{

background:white;

padding:20px;

border-radius:20px;

overflow:auto;

box-shadow:
0 5px 15px rgba(0,0,0,.08);

}

.attendance-table{

width:100%;

border-collapse:collapse;

}

.attendance-table th{

background:#facc15;

padding:12px;

text-align:left;

}

.attendance-table td{

padding:10px;

border-bottom:1px solid #eee;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>
Attendance Management
</h1>

<a
href="admin.html"
class="back-btn">

← Back

</a>

</div>

<div class="summary-grid">

<div class="summary-card">
<h3>Total Attendance</h3>
<h1 id="totalAttendance">0</h1>
</div>

<div class="summary-card">
<h3>Approved</h3>
<h1 id="approvedCount">0</h1>
</div>

<div class="summary-card">
<h3>Pending</h3>
<h1 id="pendingCount">0</h1>
</div>

<div class="summary-card">
<h3>Rejected</h3>
<h1 id="rejectedCount">0</h1>
</div>

<div class="summary-card">
<h3>Total Hours</h3>
<h1 id="totalHours">0</h1>
</div>

</div>

<div class="filter-section">

<input
type="date"
id="filterDate">

<input
type="month"
id="filterMonth">

<select
id="employeeFilter">

<option value="">
All Employees
</option>

</select>

<select
id="statusFilter">

<option value="">
All Status
</option>

<option value="Approved">
Approved
</option>

<option value="Pending">
Pending
</option>

<option value="Rejected">
Rejected
</option>

</select>

<input
type="text"
id="searchStaff"
placeholder="Search Staff">

<button
class="green-btn"
onclick="loadAttendance()">

Apply Filter

</button>

</div>

<div class="table-box">

<table
class="attendance-table">

<thead>

<tr>

<th>Date</th>
<th>Day</th>
<th>Staff</th>
<th>IN</th>
<th>OUT</th>
<th>Hours</th>
<th>Status</th>
<th>Photos</th>
<th>Location</th>
<th>Action</th>

</tr>

</thead>

<tbody
id="attendanceTable">

</tbody>

</table>

</div>
<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
addDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.loadEmployeeFilter =
async function(){

const querySnapshot =
await getDocs(
collection(
db,
"attendance"
)
);

const employeeFilter =
document.getElementById(
"employeeFilter"
);

employeeFilter.innerHTML =

`
<option value="">
All Employees
</option>
`;

const names =
new Set();

querySnapshot.forEach(
(docItem)=>{

const data =
docItem.data();

if(
data.staffName
){

names.add(
data.staffName
);

}

});

names.forEach(
(name)=>{

employeeFilter.innerHTML +=

`

<option value="${name}">

${name}

</option>

`;

});

};

window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(
db,
"attendance"
)
);

let html = "";

let totalAttendance = 0;

let approved = 0;

let pending = 0;

let rejected = 0;

let totalHours = 0;

let filteredHours = 0;

const selectedDate =

document.getElementById(
"filterDate"
).value;

const selectedMonth =

document.getElementById(
"filterMonth"
).value;

const selectedEmployee =

document.getElementById(
"employeeFilter"
).value;

const selectedStatus =

document.getElementById(
"statusFilter"
).value;

const searchStaff =

document.getElementById(
"searchStaff"
).value
.toLowerCase();

  querySnapshot.forEach(
(docItem)=>{

const data =
docItem.data();

if(
selectedEmployee &&
data.staffName !==
selectedEmployee
){
return;
}

if(
selectedStatus &&
data.status !==
selectedStatus
){
return;
}

if(
searchStaff &&
!data.staffName
.toLowerCase()
.includes(
searchStaff
)
){
return;
}

if(selectedDate){

const filterDate =
new Date(
selectedDate
)
.toLocaleDateString();

if(
data.date !==
filterDate
){
return;
}

}

if(selectedMonth){

const attendanceDate =
new Date(
data.date
);

const monthValue =

attendanceDate
.getFullYear()

+

"-"

+

String(
attendanceDate
.getMonth()+1
)
.padStart(
2,
"0"
);

if(
monthValue !==
selectedMonth
){
return;
}

}

totalAttendance++;

if(
data.status ===
"Approved"
){

approved++;

}
else if(
data.status ===
"Rejected"
){

rejected++;

}
else{

pending++;

}

filteredHours += Number(
String(
data.totalHours || 0
)
.replace(
" Hours",
""
)
);

totalHours += Number(
String(
data.totalHours || 0
)
.replace(
" Hours",
""
)
);

const dayName =

new Date(
data.date
)
.toLocaleDateString(
"en-US",
{
weekday:"long"
}
);

    html += `

<tr>

<td>

${data.date || "-"}

</td>

<td>

${dayName}

</td>

<td>

${data.staffName || "-"}

</td>

<td>

${data.inTime || "--"}

</td>

<td>

${data.outTime || "--"}

</td>

<td>

${data.totalHours || "0 Hours"}

</td>

<td>

${data.status || "Pending"}

</td>

<td>

<button
onclick="showPhotos(
'${data.inPhoto || ""}',
'${data.outPhoto || ""}'
)"
class="green-btn">

View

</button>

</td>

<td>

<button
onclick="showLocation(
'${data.inLat || ""}',
'${data.inLng || ""}',
'${data.outLat || ""}',
'${data.outLng || ""}'
)"
class="green-btn">

View

</button>

</td>

<td>

<button
onclick="approveAttendance(
'${docItem.id}'
)"
style="
background:#22c55e;
color:white;
border:none;
padding:8px;
border-radius:8px;
">

Approve

</button>

<button
onclick="rejectAttendance(
'${docItem.id}'
)"
style="
background:#ef4444;
color:white;
border:none;
padding:8px;
border-radius:8px;
">

Reject

</button>

<button
onclick="deleteAttendance(
'${docItem.id}'
)"
style="
background:#64748b;
color:white;
border:none;
padding:8px;
border-radius:8px;
">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById(
"attendanceTable"
).innerHTML =
html;

document.getElementById(
"totalAttendance"
).innerHTML =
totalAttendance;

document.getElementById(
"approvedCount"
).innerHTML =
approved;

document.getElementById(
"pendingCount"
).innerHTML =
pending;

document.getElementById(
"rejectedCount"
).innerHTML =
rejected;

document.getElementById(
"totalHours"
).innerHTML =
filteredHours.toFixed(2);

  }

  window.showPhotos =
function(
inPhoto,
outPhoto
){

let html =

"IN PHOTO\n\n";

if(inPhoto){

html +=
inPhoto;

}

html +=

"\n\nOUT PHOTO\n\n";

if(outPhoto){

html +=
outPhoto;

}

alert(
"Photo Preview Available"
);

};

window.showLocation =
function(
inLat,
inLng,
outLat,
outLng
){

alert(

"IN Location\n\n"

+

inLat

+

", "

+

inLng

+

"\n\nOUT Location\n\n"

+

outLat

+

", "

+

outLng

);

};

window.approveAttendance =
async function(id){

await updateDoc(
doc(
db,
"attendance",
id
),
{
status:
"Approved"
}
);

loadAttendance();

};

window.rejectAttendance =
async function(id){

await updateDoc(
doc(
db,
"attendance",
id
),
{
status:
"Rejected"
}
);

loadAttendance();

};

window.deleteAttendance =
async function(id){

if(
!confirm(
"Delete Attendance?"
)
){
return;
}

await deleteDoc(
doc(
db,
"attendance",
id
)
);

loadAttendance();

};

loadEmployeeFilter();

loadAttendance();

</script>

</body>

</html>
