function calculateHours(
inTime,
outTime
){

if(
!inTime ||
!outTime
){

return 0;

}

const today =
new Date();

const inDate =
new Date(
today.toDateString()
+
" "
+
inTime
);

const outDate =
new Date(
today.toDateString()
+
" "
+
outTime
);

return (
(outDate - inDate)
/1000/60/60
).toFixed(2);

}
