<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#e0f2fe,
#fef9c3,
#ffffff
);

min-height:100vh;

padding:20px;

color:#0f172a;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.header h1{

font-size:32px;

}

.back-btn{

padding:12px 22px;

border-radius:14px;

text-decoration:none;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

color:#111827;

font-weight:bold;

}

.filter{

background:white;

padding:20px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

margin-bottom:25px;

display:flex;

gap:15px;

flex-wrap:wrap;

}

.filter-box{

display:flex;

flex-direction:column;

gap:8px;

}

.filter-title{

font-size:16px;

font-weight:bold;

color:#334155;

}

.filter input{

padding:12px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:16px;

background:white;

color:#0f172a;

}

.card{

background:white;

padding:20px;

border-radius:25px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

margin-bottom:20px;

display:flex;

gap:20px;

flex-wrap:wrap;

align-items:flex-start;

}

.photo{

width:100px;

height:100px;

border-radius:50%;

object-fit:cover;

border:4px solid #facc15;

}

.details{

flex:1;

}

.details h2{

margin-bottom:15px;

}

.details input,
.details select{

width:100%;

padding:12px;

margin-bottom:12px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:15px;

background:#f8fafc;

color:#0f172a;

}

.live-hours{

background:#ecfeff;

padding:12px;

border-radius:12px;

margin-bottom:12px;

font-weight:bold;

color:#0f766e;

}

.status-approved{

background:#dcfce7;

color:#166534;

}

.status-pending{

background:#fef3c7;

color:#92400e;

}

.status-rejected{

background:#fee2e2;

color:#991b1b;

}

.save-btn{

padding:12px 20px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

font-weight:bold;

cursor:pointer;

margin-right:10px;

}

.delete-btn{

padding:12px 20px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

color:white;

font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>

<div class="header">

<h1>
Attendance Management
</h1>

<a href="admin.html"
class="back-btn">

Back

</a>

</div>

<div class="filter">

<div class="filter-box">

<div class="filter-title">

Filter Attendance By Date

</div>

<input
type="date"
id="filterDate"
onchange="loadAttendance()">

</div>

<div class="filter-box">

<div class="filter-title">

Search Staff

</div>

<input
type="text"
id="searchStaff"
placeholder="Enter Staff Name"
onkeyup="loadAttendance()">

</div>

</div>

<div id="attendanceList">

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

function calculateHours(inTime,outTime){

if(!inTime || !outTime){

return "Working...";

}

const today =
new Date();

const inDate =
new Date(
today.toDateString() +
" " +
inTime
);

const outDate =
new Date(
today.toDateString() +
" " +
outTime
);

const diff =
(outDate - inDate)
/1000/60/60;

return diff.toFixed(2) +
" Hours";

}

window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(db,"attendance")
);

const selectedDate =
document.getElementById(
"filterDate"
).value;

const search =
document.getElementById(
"searchStaff"
).value.toLowerCase();

let html = "";

querySnapshot.forEach((docItem)=>{

const data =
docItem.data();

if(search){

if(
!data.staffName
.toLowerCase()
.includes(search)
){

return;

}

}

if(selectedDate){

const formatted =
new Date(selectedDate)
.toLocaleDateString();

if(data.date !== formatted){

return;

}

}

let statusClass =
"status-pending";

if(data.status === "Approved"){

statusClass =
"status-approved";

}

if(data.status === "Rejected"){

statusClass =
"status-rejected";

}

const liveHours =
calculateHours(
data.inTime,
data.outTime
);

html += `

<div class="card">

<img
src="${
data.staffPhoto ||
'https://i.imgur.com/6VBx3io.png'
}"
class="photo">

<div class="details">

<h2>
${data.staffName}
</h2>

<input
id="date-${docItem.id}"
value="${data.date}">

<input
id="in-${docItem.id}"
value="${data.inTime || ''}"
oninput="autoCalculate('${docItem.id}')">

<input
id="out-${docItem.id}"
value="${data.outTime || ''}"
oninput="autoCalculate('${docItem.id}')">

<div
id="live-${docItem.id}"
class="live-hours">

⏱️ Total :
${liveHours}

</div>

<select
id="status-${docItem.id}"
class="${statusClass}">

<option ${
data.status==="Pending"?"selected":""
}>
Pending
</option>

<option ${
data.status==="Approved"?"selected":""
}>
Approved
</option>

<option ${
data.status==="Rejected"?"selected":""
}>
Rejected
</option>

</select>

<button
onclick="saveAttendance('${docItem.id}')"
class="save-btn">

Save Changes

</button>

<button
onclick="deleteAttendance('${docItem.id}')"
class="delete-btn">

Delete

</button>

</div>

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML =
html;

}

window.autoCalculate =
function(id){

const inTime =
document.getElementById(
`in-${id}`
).value;

const outTime =
document.getElementById(
`out-${id}`
).value;

const total =
calculateHours(
inTime,
outTime
);

document.getElementById(
`live-${id}`
).innerHTML =

"⏱️ Total : " +
total;

}

window.saveAttendance =
async function(id){

const inTime =
document.getElementById(
`in-${id}`
).value;

const outTime =
document.getElementById(
`out-${id}`
).value;

const totalHours =
calculateHours(
inTime,
outTime
);

await updateDoc(
doc(db,"attendance",id),
{

date:
document.getElementById(
`date-${id}`
).value,

inTime:
inTime,

outTime:
outTime,

totalHours:
totalHours,

status:
document.getElementById(
`status-${id}`
).value

}
);

alert("Attendance Updated");

loadAttendance();

}

window.deleteAttendance =
async function(id){

await deleteDoc(
doc(db,"attendance",id)
);

loadAttendance();

}

loadAttendance();

</script>

</body>

</html>
