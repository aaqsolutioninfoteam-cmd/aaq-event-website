<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AAQ Login Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(135deg,
#000000,
#1a1a1a,
#3b2a00,
#d4af37,
#3b2a00,
#000000);

background-size:400% 400%;
animation:bgMove 12s ease infinite;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.login-box{

width:100%;
max-width:400px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

padding:35px;

border-radius:25px;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

color:white;

}

.logo{

width:110px;
margin-bottom:20px;

}

h1{

margin-bottom:10px;
font-size:32px;

}

.subtitle{

margin-bottom:25px;
color:#e5e7eb;

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#1f2937;

color:white;

font-size:16px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:
linear-gradient(135deg,#ca8a04,#a16207);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:scale(1.03);

}

#error{

margin-top:15px;
color:#f87171;

}

</style>

</head>

<body>

<div class="login-box">

<img src="logo.png"
class="logo">

<h1>AAQ Web App</h1>

<p class="subtitle">
Secure Staff & Admin Login
</p>

<input type="email"
id="email"
placeholder="Enter Email">

<input type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<p id="error"></p>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain: "aaq-event-erp.firebaseapp.com",

projectId: "aaq-event-erp",

storageBucket: "aaq-event-erp.firebasestorage.app",

messagingSenderId: "985636664002",

appId: "1:985636664002:web:4b941d3562609d2058815b",

measurementId: "G-HHD049KDS8"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.login = async function(){

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

const querySnapshot =
await getDocs(collection(db,"staffs"));

let found = false;

querySnapshot.forEach((doc)=>{

const data = doc.data();

if(

data.email === email &&

data.password === password

){

found = true;

localStorage.setItem(
"loggedUser",
data.staffName
);

localStorage.setItem(
"userPosition",
data.position
);

localStorage.setItem(
"userPhoto",
data.photoURL
);

}

});

if(

email === "aaqsolutioninfoteam@gmail.com"

||

email === "admin@aaq.com"

){

localStorage.setItem(
"loggedUser",
"Admin"
);

localStorage.setItem(
"userPosition",
"Administrator"
);

window.location.href =
"admin.html";

}else if(found){

localStorage.setItem(
"staffName",
data.staffName
);

localStorage.setItem(
"staffPhoto",
data.photoURL
);

window.location.href =
"staff-dashboard.html";else{

alert("Invalid Login");

}

}catch(error){

alert("Login Error");

}

}

</script>

</body>

</html>
