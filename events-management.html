<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Advanced Event ERP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1400px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.back-btn{

padding:14px 24px;

border-radius:14px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.form-box{

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:28px;

backdrop-filter:blur(12px);

margin-bottom:25px;

border:1px solid rgba(255,255,255,0.12);

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:18px;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;

margin-bottom:8px;

color:#e2e8f0;

}

.input-group input,
.input-group select{

width:100%;

padding:13px;

border:none;

border-radius:12px;

background:rgba(255,255,255,0.12);

color:white;

font-size:15px;

outline:none;

}

.add-btn,
.save-btn,
.edit-btn{

padding:14px;

border:none;

border-radius:14px;

font-weight:bold;

cursor:pointer;

color:white;

margin-top:10px;

}

.add-btn{

background:#2563eb;

width:100%;

}

.save-btn{

background:#22c55e;

width:100%;

}

.edit-btn{

background:#f59e0b;

}

.post-box{

background:rgba(255,255,255,0.06);

padding:20px;

border-radius:20px;

margin-top:20px;

border:1px solid rgba(255,255,255,0.08);

}

.staff-item{

padding:12px;

background:rgba(255,255,255,0.08);

border-radius:10px;

margin-top:10px;

}

.staff-item button{

float:right;

background:red;

border:none;

color:white;

padding:5px 10px;

border-radius:8px;

cursor:pointer;

}

.event-card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:25px;

margin-top:20px;

border:1px solid rgba(255,255,255,0.12);

}

.event-card h2{

color:#facc15;

margin-bottom:15px;

}

.status{

display:inline-block;

padding:8px 15px;

border-radius:10px;

margin-top:15px;

font-weight:bold;

}

.active{

background:#22c55e;

}

.expired{

background:#ef4444;

}

.action-btns{

display:flex;

gap:10px;

margin-top:15px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>
Advanced Event ERP
</h1>

<p>
Professional Multi Staff Event Management
</p>

</div>

<a href="admin.html"
class="back-btn">

Back To Admin

</a>

</div>

<div class="form-box">

<div class="grid">

<div class="input-group">

<label>
Event Name
</label>

<input
type="text"
id="eventName">

</div>

<div class="input-group">

<label>
Event Address
</label>

<input
type="text"
id="eventAddress">

</div>

<div class="input-group">

<label>
Start Date
</label>

<input
type="date"
id="startDate">

</div>

<div class="input-group">

<label>
End Date
</label>

<input
type="date"
id="endDate">

</div>

<div class="input-group">

<label>
Event Coordinator
</label>

<input
type="text"
id="eventCoordinator">

</div>

<div class="input-group">

<label>
Access Manager
</label>

<input
type="text"
id="accessManager">

</div>

<div class="input-group">

<label>
Technical Team
</label>

<input
type="text"
id="technicalTeam">

</div>

</div>

<div id="postContainer"></div>

<button
class="add-btn"
onclick="addPost()">

+ Add Event Crew Post

</button>

<button
class="save-btn"
onclick="saveEvent()">

Save Event

</button>

</div>

<div id="eventList"></div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let totalPosts = 0;

let editIndex = null;

async function loadStaffOptions(select){

const querySnapshot =
await getDocs(
collection(db,"staffs")
);

let options =
"<option>Select Staff</option>";

querySnapshot.forEach((doc)=>{

const staff =
doc.data();

options += `

<option value="${staff.email}">

${staff.staffName}
-
${staff.email}

</option>

`;

});

select.innerHTML =
options;

}

window.addPost =
function(){

totalPosts++;

const div =
document.createElement("div");

div.className =
"post-box";

div.innerHTML = `

<h3>
Crew Post ${totalPosts}
</h3>

<div class="grid">

<div class="input-group">

<label>
Event Crew Post
</label>

<input
type="text"
class="crewPost">

</div>

<div class="input-group">

<label>
Staff Duty Area
</label>

<input
type="text"
class="dutyArea">

</div>

<div class="input-group">

<label>
Post Coordinator
</label>

<input
type="text"
class="coordinator">

</div>

</div>

<div class="input-group">

<label>
Assign Staff
</label>

<select class="staffSelect"></select>

</div>

<button
type="button"
class="add-btn"
onclick="addStaff(this)">

+ Add Staff

</button>

<div class="selectedStaffList"></div>

`;

document.getElementById(
"postContainer"
).appendChild(div);

loadStaffOptions(
div.querySelector(".staffSelect")
);

}

window.addStaff =
function(button){

const postBox =
button.closest(".post-box");

const select =
postBox.querySelector(".staffSelect");

const email =
select.value;

if(
!email
||
email === "Select Staff"
){

return;

}

const list =
postBox.querySelector(
".selectedStaffList"
);

const alreadyAdded =
Array.from(
list.querySelectorAll(".staff-email")
).some(

item =>

item.innerText.trim()

===

email.trim()

);

if(alreadyAdded){

alert(
"Staff Already Added"
);

return;

}

list.innerHTML += `

<div class="staff-item">

<span class="staff-email">

${email}

</span>

<button
type="button"
onclick="removeStaff(this)">

Remove

</button>

</div>

`;

}

window.removeStaff =
function(button){

button.parentElement.remove();

}

window.saveEvent =
function(){

const posts = [];

document.querySelectorAll(
".post-box"
).forEach((post)=>{

const emails = [];

post.querySelectorAll(
".staff-email"
).forEach((item)=>{

emails.push(
item.innerText.trim()
);

});

posts.push({

crewPost:
post.querySelector(".crewPost").value,

dutyArea:
post.querySelector(".dutyArea").value,

coordinator:
post.querySelector(".coordinator").value,

staffEmails:
emails

});

});

const events =
JSON.parse(
localStorage.getItem("events")
) || [];

const eventData = {

eventName:
document.getElementById("eventName").value,

eventAddress:
document.getElementById("eventAddress").value,

startDate:
document.getElementById("startDate").value,

endDate:
document.getElementById("endDate").value,

eventCoordinator:
document.getElementById("eventCoordinator").value,

accessManager:
document.getElementById("accessManager").value,

technicalTeam:
document.getElementById("technicalTeam").value,

posts

};

if(editIndex === null){

events.push(eventData);

}else{

events[editIndex] =
eventData;

editIndex = null;

}

localStorage.setItem(
"events",
JSON.stringify(events)
);

alert(
"Event Saved Successfully"
);

document.getElementById(
"postContainer"
).innerHTML = "";

addPost();

loadEvents();

}

window.editEvent =
function(index){

const events =
JSON.parse(
localStorage.getItem("events")
) || [];

const event =
events[index];

document.getElementById(
"eventName"
).value =
event.eventName;

document.getElementById(
"eventAddress"
).value =
event.eventAddress;

document.getElementById(
"startDate"
).value =
event.startDate;

document.getElementById(
"endDate"
).value =
event.endDate;

document.getElementById(
"eventCoordinator"
).value =
event.eventCoordinator;

document.getElementById(
"accessManager"
).value =
event.accessManager;

document.getElementById(
"technicalTeam"
).value =
event.technicalTeam;

document.getElementById(
"postContainer"
).innerHTML = "";

event.posts.forEach((post)=>{

addPost();

setTimeout(()=>{

const boxes =
document.querySelectorAll(
".post-box"
);

const currentPost =
boxes[boxes.length - 1];

currentPost.querySelector(
".crewPost"
).value =
post.crewPost;

currentPost.querySelector(
".dutyArea"
).value =
post.dutyArea;

currentPost.querySelector(
".coordinator"
).value =
post.coordinator;

const list =
currentPost.querySelector(
".selectedStaffList"
);

post.staffEmails.forEach((email)=>{

list.innerHTML += `

<div class="staff-item">

<span class="staff-email">

${email}

</span>

<button
type="button"
onclick="removeStaff(this)">

Remove

</button>

</div>

`;

});

},300);

});

editIndex = index;

window.scrollTo({

top:0,
behavior:"smooth"

});

}

window.loadEvents =
function(){

const events =
JSON.parse(
localStorage.getItem("events")
) || [];

let html = "";

events.forEach((event,index)=>{

const today =
new Date()
.toISOString()
.split("T")[0];

const status =
today > event.endDate

?

"Expired"

:

"Active";

html += `

<div class="event-card">

<h2>
${event.eventName}
</h2>

<p>
📍 ${event.eventAddress}
</p>

<p>
📅 ${event.startDate}
To
${event.endDate}
</p>

<p>
👨 ${event.eventCoordinator}
</p>

<p>
🛡️ ${event.accessManager}
</p>

<p>
🖥️ ${event.technicalTeam}
</p>

<hr style="margin:15px 0;">

${event.posts.map(post=>`

<div class="staff-item">

<p>
💼 ${post.crewPost}
</p>

<p>
📍 ${post.dutyArea}
</p>

<p>
👨 ${post.coordinator}
</p>

<p>
👥 ${post.staffEmails.join(", ")}
</p>

</div>

`).join("")}

<div class="status
${status === "Active"
? "active"
: "expired"}">

${status}

</div>

<div class="action-btns">

<button
class="edit-btn"
onclick="editEvent(${index})">

Edit Event

</button>

</div>

</div>

`;

});

document.getElementById(
"eventList"
).innerHTML =
html;

}

addPost();

loadEvents();

</script>

</body>

</html>
