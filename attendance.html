<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Staff Attendance V4
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#e0f2fe,
#fef9c3,
#ffffff
);

padding:20px;

color:#0f172a;

}

.container{

max-width:1200px;

margin:auto;

}

.staff-header{

background:white;

padding:20px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

display:flex;

align-items:center;

gap:20px;

flex-wrap:wrap;

margin-bottom:20px;

}

.staff-photo{

width:90px;

height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid #facc15;

}

.summary-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:15px;

margin-bottom:20px;

}

.summary-card{

background:white;

padding:20px;

border-radius:20px;

text-align:center;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

}

.summary-card h1{

font-size:28px;

margin-top:10px;

}

.camera-card{

background:white;

padding:20px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

margin-bottom:20px;

text-align:center;

}

</style>

</head>

<body>

<div class="container">

<div class="staff-header">

<img
id="staffPhoto"
class="staff-photo"
src="https://i.imgur.com/6VBx3io.png">

<div>

<h2 id="staffName">
Staff Name
</h2>

<p id="staffPosition">
Staff Position
</p>

<p id="currentDate">
Date
</p>

<p id="currentTime">
Time
</p>

</div>

</div>

<div class="summary-grid">

<div class="summary-card">
<h3>Total Attendance</h3>
<h1 id="totalAttendance">0</h1>
</div>

<div class="summary-card">
<h3>Approved</h3>
<h1 id="approvedCount">0</h1>
</div>

<div class="summary-card">
<h3>Pending</h3>
<h1 id="pendingCount">0</h1>
</div>

<div class="summary-card">
<h3>Rejected</h3>
<h1 id="rejectedCount">0</h1>
</div>

<div class="summary-card">
<h3>Total Hours</h3>
<h1 id="totalHours">0</h1>
</div>

</div>
<style>

#video{

width:100%;

max-width:350px;

border-radius:20px;

border:4px solid #facc15;

}

.live-hours{

margin-top:15px;

padding:15px;

background:#f8fafc;

border-radius:15px;

font-size:18px;

font-weight:bold;

}

.status-box{

margin-top:15px;

padding:12px;

border-radius:12px;

background:#f8fafc;

font-weight:bold;

}

.button-grid{

display:flex;

gap:15px;

justify-content:center;

flex-wrap:wrap;

margin-top:20px;

}

.face-in-btn{

padding:14px 25px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

}

.face-out-btn{

padding:14px 25px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

color:white;

}

.attendance-history{

background:white;

padding:20px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

margin-top:20px;

}

</style>

<div class="camera-card">

<h2>

📷 Face Attendance

</h2>

<br>

<video
id="video"
autoplay
playsinline>

</video>

<canvas
id="canvas"
style="display:none;">

</canvas>

<div
id="statusBox"
class="status-box">

Ready For Attendance

</div>

<div
id="workingHours"
class="live-hours">

⏱ Working Time : 0 Hours

</div>

<div class="button-grid">

<button
class="face-in-btn"
onclick="faceCheckIn()">

🟢 FACE IN

</button>

<button
class="face-out-btn"
onclick="faceCheckOut()">

🔴 FACE OUT

</button>

</div>

</div>

<div class="attendance-history">

<h2>

📋 Attendance History

</h2>

<br>

<div
id="attendanceList">

</div>

</div>
  <script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
query,
where,
updateDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const staffName =
localStorage.getItem(
"staffName"
) || "Staff User";

const staffPhoto =
localStorage.getItem(
"staffPhoto"
);

const staffPosition =
localStorage.getItem(
"staffPosition"
) || "Staff";

document.getElementById(
"staffName"
).innerHTML =
staffName;

document.getElementById(
"staffPosition"
).innerHTML =
staffPosition;

if(staffPhoto){

document.getElementById(
"staffPhoto"
).src =
staffPhoto;

}

function updateDateTime(){

document.getElementById(
"currentDate"
).innerHTML =

"📅 " +
new Date()
.toLocaleDateString();

document.getElementById(
"currentTime"
).innerHTML =

"🕒 " +
new Date()
.toLocaleTimeString();

}

updateDateTime();

setInterval(
updateDateTime,
1000
);

const video =
document.getElementById(
"video"
);

navigator.mediaDevices
.getUserMedia({
video:true
})
.then(stream=>{

video.srcObject =
stream;

});

let currentLat = "";
let currentLng = "";

async function getLocation(){

return new Promise(
(resolve)=>{

navigator.geolocation
.getCurrentPosition(

(position)=>{

currentLat =
position.coords.latitude;

currentLng =
position.coords.longitude;

resolve();

},

(error)=>{

console.log(error);

resolve();

}

);

});

}

function capturePhoto(){

const canvas =
document.getElementById(
"canvas"
);

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

const ctx =
canvas.getContext(
"2d"
);

ctx.drawImage(
video,
0,
0
);

return canvas.toDataURL(
"image/png"
);

}

const statusBox =
document.getElementById(
"statusBox"
);

    window.faceCheckIn =
async function(){

statusBox.innerHTML =
"📷 Verifying Face...";

const today =
new Date()
.toLocaleDateString();

const checkQuery =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const checkDocs =
await getDocs(checkQuery);

if(!checkDocs.empty){

alert(
"Today's Attendance Already Marked"
);

return;

}

await getLocation();

const photoData =
capturePhoto();

await addDoc(
collection(
db,
"attendance"
),
{

staffName:
staffName,

staffPhoto:
staffPhoto || "",

staffPosition:
staffPosition || "",

date:
today,

inTime:
new Date()
.toLocaleTimeString(),

outTime:"",

totalHours:"",

status:"Pending",

inPhoto:
photoData,

outPhoto:"",

inLat:
currentLat,

inLng:
currentLng,

outLat:"",

outLng:""

}
);

statusBox.innerHTML =
"✅ FACE IN SUCCESSFUL";

alert(
"Attendance Marked Successfully"
);

loadAttendance();

};

window.faceCheckOut =
async function(){

statusBox.innerHTML =
"📷 Verifying Face...";

await getLocation();

const photoData =
capturePhoto();

const today =
new Date()
.toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const querySnapshot =
await getDocs(q);

if(querySnapshot.empty){

alert(
"Please FACE IN First"
);

return;

}

querySnapshot.forEach(
async(item)=>{

const data =
item.data();

if(data.outTime){

return;

}

const outDate =
new Date();

const inDate =
new Date(
today +
" " +
data.inTime
);

const diff =
(outDate - inDate)
/1000/60/60;

await updateDoc(
doc(
db,
"attendance",
item.id
),
{

outTime:
outDate
.toLocaleTimeString(),

totalHours:
diff.toFixed(2)
+
" Hours",

outPhoto:
photoData,

outLat:
currentLat,

outLng:
currentLng

}
);

});

statusBox.innerHTML =
"✅ FACE OUT SUCCESSFUL";

alert(
"Attendance Closed Successfully"
);

loadAttendance();

};

setInterval(
async()=>{

const today =
new Date()
.toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const querySnapshot =
await getDocs(q);

querySnapshot.forEach(
(docItem)=>{

const data =
docItem.data();

if(!data.outTime){

const now =
new Date();

const inDate =
new Date(
today +
" " +
data.inTime
);

const diff =
(now - inDate)
/1000/60/60;

document.getElementById(
"workingHours"
).innerHTML =

"⏱ Working Time : " +
diff.toFixed(2) +
" Hours";

}

});

},60000);

    
window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(
db,
"attendance"
)
);

let totalAttendance = 0;
let approved = 0;
let pending = 0;
let rejected = 0;
let totalHours = 0;

let html = "";

querySnapshot.forEach(
(docItem)=>{

const data =
docItem.data();

if(
data.staffName !==
staffName
){
return;
}

totalAttendance++;

if(
data.status ===
"Approved"
){
approved++;
}
else if(
data.status ===
"Rejected"
){
rejected++;
}
else{
pending++;
}

totalHours += Number(
String(
data.totalHours || "0"
).replace(
" Hours",
""
)
);

html += `

<div
style="
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:
0 5px 15px rgba(0,0,0,.08);
">

<h3>

📅 ${data.date || "-"}

</h3>

<p>

🟢 IN :
${data.inTime || "--"}

</p>

<p>

🔴 OUT :
${data.outTime || "--"}

</p>

<p>

⏱ Hours :
${data.totalHours || "Working..."}

</p>

<p>

📊 Status :
${data.status || "Pending"}

</p>

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML =
html;

document.getElementById(
"totalAttendance"
).innerHTML =
totalAttendance;

document.getElementById(
"approvedCount"
).innerHTML =
approved;

document.getElementById(
"pendingCount"
).innerHTML =
pending;

document.getElementById(
"rejectedCount"
).innerHTML =
rejected;

document.getElementById(
"totalHours"
).innerHTML =
totalHours.toFixed(2);

}

loadAttendance();

</script>

</body>

</html>
