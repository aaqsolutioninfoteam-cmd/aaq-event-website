<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AAQ Staff Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b,
#2563eb
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1200px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

background:rgba(255,255,255,0.08);

padding:20px;

border-radius:25px;

backdrop-filter:blur(12px);

}

.profile{

display:flex;

align-items:center;

gap:15px;

}

.profile img{

width:80px;

height:80px;

border-radius:50%;

object-fit:cover;

border:4px solid #facc15;

}

.live-box{

line-height:1.8;

}

.notice{

background:rgba(250,204,21,0.12);

padding:20px;

border-radius:22px;

margin-bottom:25px;

backdrop-filter:blur(12px);

border:1px solid rgba(250,204,21,0.25);

}

.notice h2{

margin-bottom:12px;

color:#facc15;

}

.dashboard{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:20px;

}

.card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:25px;

backdrop-filter:blur(12px);

text-align:center;

transition:0.3s;

border:1px solid rgba(255,255,255,0.12);

}

.card:hover{

transform:translateY(-5px);

}

.card h2{

margin-bottom:15px;

}

.card p{

margin-bottom:20px;

color:#e2e8f0;

}

.btn{

display:inline-block;

padding:13px 24px;

border-radius:12px;

text-decoration:none;

font-weight:bold;

color:white;

}

.attendance{

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

}

.profilebtn{

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

}

.events{

background:
linear-gradient(
135deg,
#ca8a04,
#a16207
);

}

.reports{

background:
linear-gradient(
135deg,
#7c3aed,
#5b21b6
);

}

.idcard{

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

}

.popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.7);

justify-content:center;

align-items:center;

z-index:9999;

}

.popup-box{

background:#0f172a;

padding:30px;

border-radius:25px;

width:350px;

text-align:center;

border:1px solid rgba(255,255,255,0.15);

position:relative;

}

.close{

position:absolute;

top:12px;
right:15px;

font-size:24px;

cursor:pointer;

}

.popup-box h2{

margin-bottom:15px;

color:#facc15;

}

.popup-box p{

line-height:1.8;

color:#e2e8f0;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div class="profile">

<img
id="staffPhoto"
src="https://i.imgur.com/6VBx3io.png">

<div>

<h2 id="staffName">
Staff User
</h2>

<p id="staffRole">
STAFF
</p>

</div>

</div>

<div class="live-box">

<div id="liveDate"></div>

<div id="liveTime"></div>

</div>

</div>

<div
class="notice"
id="dutyNotice">

<h2>
📢 Duty Notification
</h2>

<p>
No Duty Notice Available
</p>

</div>

<div class="dashboard">

<div class="card">

<h2>
Attendance
</h2>

<p>
Mark IN / OUT Attendance
</p>

<a
href="attendance.html"
class="btn attendance">

Open

</a>

</div>

<div class="card">

<h2>
My Profile
</h2>

<p>
View Profile Details
</p>

<a
href="profile.html"
class="btn profilebtn">

Open

</a>

</div>

<div class="card">

<h2>
Events
</h2>

<p>
Check Event Duties
</p>

<a
href="events.html"
class="btn events">

Open

</a>

</div>

<div class="card">

<h2>
Reports
</h2>

<p>
Attendance Reports
</p>

<a
href="reports.html"
class="btn reports">

Open

</a>

</div>

<div class="card">

<h2>
ID Card
</h2>

<p>
Check ID Card Status
</p>

<a
href="id-card.html"
class="btn idcard">

Open

</a>

</div>

</div>

</div>

<!-- POPUP -->

<div
class="popup"
id="popupBox">

<div class="popup-box">

<div
class="close"
onclick="closePopup()">

❌

</div>

<h2 id="popupTitle">
Notification
</h2>

<p id="popupMessage">

</p>

</div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const staffName =
localStorage.getItem(
"staffName"
) || "Staff User";

const staffPhoto =
localStorage.getItem(
"staffPhoto"
);

const staffRole =
localStorage.getItem(
"staffRole"
) || "STAFF";

document.getElementById(
"staffName"
).innerHTML =
staffName;

document.getElementById(
"staffRole"
).innerHTML =
staffRole;

if(staffPhoto){

document.getElementById(
"staffPhoto"
).src =
staffPhoto;

}

function updateDateTime(){

const now = new Date();

document.getElementById(
"liveDate"
).innerHTML =

"📅 " +
now.toLocaleDateString();

document.getElementById(
"liveTime"
).innerHTML =

"🕒 " +
now.toLocaleTimeString();

}

setInterval(updateDateTime,1000);

updateDateTime();

window.closePopup =
function(){

document.getElementById(
"popupBox"
).style.display =
"none";

}

onSnapshot(
collection(db,"popupNotice"),
(snapshot)=>{

snapshot.forEach((doc)=>{

const data =
doc.data();

if(
data.status === "Enabled"
){

document.getElementById(
"popupTitle"
).innerHTML =
data.title;

document.getElementById(
"popupMessage"
).innerHTML =
data.message;

document.getElementById(
"popupBox"
).style.display =
"flex";

}

});

});

onSnapshot(
collection(db,"dutyNotice"),
(snapshot)=>{

snapshot.forEach((doc)=>{

const data =
doc.data();

document.getElementById(
"dutyNotice"
).innerHTML =

`
<h2>
📢 Duty Notification
</h2>

<p>

📅 ${data.date}

<br><br>

🕒 ${data.start}
 To
 ${data.end}

<br><br>

📌 ${data.message}

</p>
`;

});

});

</script>

</body>

</html>
