<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Attendance & Notifications</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; padding: 20px; color: #1e293b; }
        .admin-container { max-width: 1400px; margin: auto; }
        
        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 4px solid #3b82f6; }
        .stat-card h3 { font-size: 14px; color: #64748b; text-transform: uppercase; }
        .stat-card h1 { font-size: 32px; margin-top: 5px; }

        /* Notification Box Style */
        .notification-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #8b5cf6; }
        .notification-card h3 { margin-bottom: 10px; color: #6d28d9; }
        .noti-flex { display: flex; gap: 10px; }
        .noti-flex input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }

        /* Filter Section */
        .filter-bar { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        /* Table Style */
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 15px; border-bottom: 2px solid #edf2f7; color: #475569; }
        td { padding: 15px; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        
        /* Buttons */
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; margin-right: 5px; font-size: 12px; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-approve { background: #22c55e; }
        .btn-reject { background: #ef4444; }
        .btn-view { background: #8b5cf6; }
        .btn-map { background: #0ea5e9; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .pending { background: #fef3c7; color: #92400e; }
        .approved { background: #dcfce7; color: #166534; }
        .rejected { background: #fee2e2; color: #991b1b; }
        
        img.thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

<div class="admin-container">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>🚀 Admin Attendance Dashboard</h2>
        <button class="btn btn-view" onclick="exportMasterData()">Export All Data (CSV)</button>
    </div>

    <div class="notification-card">
        <h3>📢 Broadcast Notification to Staff</h3>
        <div class="noti-flex">
            <input type="text" id="notiMessage" placeholder="Type important notice or announcement here...">
            <button class="btn btn-view" style="padding: 0 20px;" onclick="sendNotification()">Send Notice</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="border-color: #3b82f6;"><h3>Total Records</h3><h1 id="statTotal">0</h1></div>
        <div class="stat-card" style="border-color: #eab308;"><h3>Pending</h3><h1 id="statPending">0</h1></div>
        <div class="stat-card" style="border-color: #22c55e;"><h3>Approved</h3><h1 id="statApproved">0</h1></div>
        <div class="stat-card" style="border-color: #ef4444;"><h3>Rejected</h3><h1 id="statRejected">0</h1></div>
    </div>

    <div class="filter-bar">
        <input type="text" id="searchName" placeholder="Search Staff Name..." oninput="filterData()">
        <input type="date" id="searchDate" onchange="filterData()">
        <select id="statusFilter" onchange="filterData()">
            <option value="">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Staff</th>
                    <th>Date</th>
                    <th>In Time</th>
                    <th>Out Time</th>
                    <th>Hours</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, addDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",
        authDomain: "aaq-event-erp.firebaseapp.com",
        projectId: "aaq-event-erp",
        storageBucket: "aaq-event-erp.firebasestorage.app",
        messagingSenderId: "985636664002",
        appId: "1:985636664002:web:4b941d3562609d2058815b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allData = [];

    // Fetch All Attendance Records
    async function loadAdminData() {
        const q = query(collection(db, "attendance"), orderBy("date", "desc"));
        const querySnapshot = await getDocs(q);
        allData = [];
        querySnapshot.forEach(doc => {
            allData.push({ id: doc.id, ...doc.data() });
        });
        renderTable(allData);
        updateStats();
    }

    function renderTable(data) {
        const tbody = document.getElementById("adminTableBody");
        tbody.innerHTML = "";
        
        data.forEach(item => {
            const row = `
                <tr>
                    <td>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${item.staffPhoto || 'https://via.placeholder.com/40'}" class="thumb">
                            <div><b>${item.staffName}</b><br><small>${item.staffPosition}</small></div>
                        </div>
                    </td>
                    <td>${item.date}</td>
                    <td>${item.inTime}</td>
                    <td>${item.outTime || '--'}</td>
                    <td>${item.totalHours || '0'}</td>
                    <td><span class="status-badge ${item.status ? item.status.toLowerCase() : 'pending'}">${item.status || 'Pending'}</span></td>
                    <td>
                        <button class="btn btn-approve" onclick="changeStatus('${item.id}', 'Approved')">✔</button>
                        <button class="btn btn-reject" onclick="changeStatus('${item.id}', 'Rejected')">✖</button>
                        <button class="btn btn-map" onclick="viewMap('${item.inLat}', '${item.inLng}')">📍</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // Update Status to Firestore
    window.changeStatus = async (id, newStatus) => {
        const docRef = doc(db, "attendance", id);
        await updateDoc(docRef, { status: newStatus });
        alert("Status Updated to " + newStatus);
        loadAdminData();
    };

    // Fixed Map View Link
    window.viewMap = (lat, lng) => {
        if(lat && lat !== "undefined" && lat !== "") {
            window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
        } else {
            alert("Location data not available for this entry.");
        }
    };

    // Send Notification Function
    window.sendNotification = async () => {
        const msg = document.getElementById("notiMessage").value.trim();
        if(!msg) {
            alert("Please type a message first!");
            return;
        }

        try {
            await addDoc(collection(db, "notifications"), {
                message: msg,
                timestamp: new Date().toLocaleString(),
                date: new Date().toLocaleDateString()
            });
            alert("📢 Notification sent successfully to all Staff members!");
            document.getElementById("notiMessage").value = "";
        } catch (error) {
            console.error("Error sending notification: ", error);
            alert("Failed to send notification.");
        }
    };

    function updateStats() {
        document.getElementById("statTotal").innerText = allData.length;
        document.getElementById("statPending").innerText = allData.filter(d => d.status === "Pending" || !d.status).length;
        document.getElementById("statApproved").innerText = allData.filter(d => d.status === "Approved").length;
        document.getElementById("statRejected").innerText = allData.filter(d => d.status === "Rejected").length;
    }

    window.filterData = () => {
        const name = document.getElementById("searchName").value.toLowerCase();
        const date = document.getElementById("searchDate").value;
        const status = document.getElementById("statusFilter").value;

        const filtered = allData.filter(item => {
            const matchesName = item.staffName ? item.staffName.toLowerCase().includes(name) : false;
            const matchesDate = !date || (item.date && item.date.includes(date));
            const matchesStatus = !status || item.status === status;
            return matchesName && matchesDate && matchesStatus;
        });
        renderTable(filtered);
    };

    window.exportMasterData = () => {
        let csv = "Name,Position,Date,In Time,Out Time,Total Hours,Status\n";
        allData.forEach(d => {
            csv += `"${d.staffName || ''}","${d.staffPosition || ''}","${d.date || ''}","${d.inTime || ''}","${d.outTime || ''}","${d.totalHours || ''}","${d.status || 'Pending'}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Master_Attendance_Report.csv';
        a.click();
    };

    loadAdminData();
</script>
</body>
</html>
