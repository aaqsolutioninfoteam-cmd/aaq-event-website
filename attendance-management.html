<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#e0f2fe,
#fef9c3,
#ffffff
);

min-height:100vh;

padding:20px;

color:#0f172a;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.back-btn{

padding:12px 20px;

border-radius:12px;

text-decoration:none;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

color:#111827;

font-weight:bold;

}

.filter{

background:white;

padding:20px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

margin-bottom:25px;

display:flex;

gap:15px;

flex-wrap:wrap;

}

.filter input{

padding:12px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:16px;

}

.card{

background:white;

padding:20px;

border-radius:25px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

margin-bottom:20px;

display:flex;

gap:20px;

flex-wrap:wrap;

align-items:center;

}

.photo{

width:100px;

height:100px;

border-radius:50%;

object-fit:cover;

border:4px solid #facc15;

}

.details{

flex:1;

}

.details input,
.details select{

width:100%;

padding:12px;

margin-bottom:10px;

border-radius:10px;

border:1px solid #cbd5e1;

}

.save-btn{

padding:12px 20px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

font-weight:bold;

cursor:pointer;

}

.delete-btn{

padding:12px 20px;

border:none;

border-radius:12px;

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

color:white;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}

</style>

</head>

<body>

<div class="header">

<h1>
Attendance Management
</h1>

<a href="admin.html"
class="back-btn">

Back

</a>

</div>

<div class="filter">

<input
type="date"
id="filterDate"
onchange="loadAttendance()">

<input
type="text"
id="searchStaff"
placeholder="Search Staff"
onkeyup="loadAttendance()">

</div>

<div id="attendanceList">

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(db,"attendance")
);

const selectedDate =
document.getElementById(
"filterDate"
).value;

const search =
document.getElementById(
"searchStaff"
).value.toLowerCase();

let html = "";

querySnapshot.forEach((docItem)=>{

const data =
docItem.data();

if(search){

if(
!data.staffName
.toLowerCase()
.includes(search)
){

return;

}

}

if(selectedDate){

const formatted =
new Date(selectedDate)
.toLocaleDateString();

if(data.date !== formatted){

return;

}

}

html += `

<div class="card">

<img
src="${
data.staffPhoto ||
'https://i.imgur.com/6VBx3io.png'
}"
class="photo">

<div class="details">

<h2>
${data.staffName}
</h2>

<input
id="date-${docItem.id}"
value="${data.date}">

<input
id="in-${docItem.id}"
value="${data.inTime || ''}">

<input
id="out-${docItem.id}"
value="${data.outTime || ''}">

<input
id="total-${docItem.id}"
value="${data.totalHours || ''}">

<select id="status-${docItem.id}">

<option ${
data.status==="Pending"?"selected":""
}>
Pending
</option>

<option ${
data.status==="Approved"?"selected":""
}>
Approved
</option>

<option ${
data.status==="Rejected"?"selected":""
}>
Rejected
</option>

</select>

<button
onclick="saveAttendance('${docItem.id}')"
class="save-btn">

Save Changes

</button>

<button
onclick="deleteAttendance('${docItem.id}')"
class="delete-btn">

Delete

</button>

</div>

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML =
html;

}

window.saveAttendance =
async function(id){

await updateDoc(
doc(db,"attendance",id),
{

date:
document.getElementById(
`date-${id}`
).value,

inTime:
document.getElementById(
`in-${id}`
).value,

outTime:
document.getElementById(
`out-${id}`
).value,

totalHours:
document.getElementById(
`total-${id}`
).value,

status:
document.getElementById(
`status-${id}`
).value

}
);

alert("Attendance Updated");

}

window.deleteAttendance =
async function(id){

await deleteDoc(
doc(db,"attendance",id)
);

loadAttendance();

}

loadAttendance();

</script>

</body>

</html>
