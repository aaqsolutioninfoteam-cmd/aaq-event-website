<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Event Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1350px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.back-btn{

padding:14px 24px;

border-radius:14px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.form-box{

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:28px;

backdrop-filter:blur(12px);

margin-bottom:25px;

border:1px solid rgba(255,255,255,0.12);

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:18px;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;

margin-bottom:8px;

color:#e2e8f0;

}

.input-group input,
.input-group textarea,
.input-group select{

width:100%;

padding:13px;

border:none;

border-radius:12px;

background:rgba(255,255,255,0.12);

color:white;

font-size:15px;

outline:none;

}

textarea{

height:120px;

resize:none;

}

.save-btn{

width:100%;

padding:16px;

border:none;

border-radius:15px;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

margin-top:15px;

}

.event-list{

display:grid;

gap:22px;

}

.card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:28px;

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.12);

}

.card h2{

margin-bottom:15px;

color:#facc15;

}

.card p{

margin-bottom:10px;

line-height:1.7;

color:#e2e8f0;

}

.action-btns{

display:flex;

gap:10px;

margin-top:15px;

flex-wrap:wrap;

}

.edit-btn{

padding:12px 18px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

font-weight:bold;

}

.delete-btn{

padding:12px 18px;

border:none;

border-radius:12px;

background:#ef4444;

color:white;

cursor:pointer;

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>
Event Management
</h1>

<p>
Professional ERP Event Control
</p>

</div>

<a href="admin.html"
class="back-btn">

Back To Admin

</a>

</div>

<div class="form-box">

<div class="grid">

<div class="input-group">

<label>
Event Name
</label>

<input
type="text"
id="eventName">

</div>

<div class="input-group">

<label>
Event Area
</label>

<input
type="text"
id="eventArea">

</div>

<div class="input-group">

<label>
Duty Time
</label>

<input
type="text"
id="eventTime">

</div>

<div class="input-group">

<label>
Manager Name
</label>

<input
type="text"
id="managerName">

</div>

<div class="input-group">

<label>
Coordinator Name
</label>

<input
type="text"
id="coordinatorName">

</div>

<div class="input-group">

<label>
Team Members
</label>

<input
type="text"
id="teamMembers">

</div>

<div class="input-group">

<label>
Assign Staff Email
</label>

<select id="assignStaff">

<option>
Loading Staff...
</option>

</select>

</div>

<div class="input-group">

<label>
Duty Type
</label>

<select id="dutyType">

<option>
Reception
</option>

<option>
Security
</option>

<option>
Stage Control
</option>

<option>
Parking
</option>

</select>

</div>

</div>

<div class="input-group">

<label>
Event Details
</label>

<textarea
id="eventDetails"></textarea>

</div>

<button
onclick="saveEvent()"
class="save-btn">

Save Event

</button>

</div>

<div
class="event-list"
id="eventList">

</div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc,
updateDoc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let editId = null;

async function loadStaffEmails(){

const querySnapshot =
await getDocs(
collection(db,"staffs")
);

let options =
"<option>Select Staff</option>";

querySnapshot.forEach((docItem)=>{

const staff =
docItem.data();

options += `

<option value="${staff.email}">

${staff.staffName}
-
${staff.email}

</option>

`;

});

document.getElementById(
"assignStaff"
).innerHTML =
options;

}

window.saveEvent =
async function(){

const data = {

eventName:
document.getElementById("eventName").value,

eventArea:
document.getElementById("eventArea").value,

eventTime:
document.getElementById("eventTime").value,

managerName:
document.getElementById("managerName").value,

coordinatorName:
document.getElementById("coordinatorName").value,

teamMembers:
document.getElementById("teamMembers").value,

assignStaff:
document.getElementById("assignStaff").value,

dutyType:
document.getElementById("dutyType").value,

eventDetails:
document.getElementById("eventDetails").value

};

if(editId){

await updateDoc(
doc(db,"events",editId),
data
);

alert("Event Updated");

editId = null;

}else{

await addDoc(
collection(db,"events"),
data
);

alert("Event Saved");

}

loadEvents();

}

async function loadEvents(){

const querySnapshot =
await getDocs(
collection(db,"events")
);

let html = "";

querySnapshot.forEach((docItem)=>{

const event =
docItem.data();

html += `

<div class="card">

<h2>
${event.eventName}
</h2>

<p>
📍 ${event.eventArea}
</p>

<p>
🕒 ${event.eventTime}
</p>

<p>
👔 Manager :
${event.managerName}
</p>

<p>
👨 Coordinator :
${event.coordinatorName}
</p>

<p>
👥 Team :
${event.teamMembers}
</p>

<p>
📧 Staff :
${event.assignStaff}
</p>

<p>
🧾 Duty :
${event.dutyType}
</p>

<p>
📝 ${event.eventDetails}
</p>

<div class="action-btns">

<button
class="edit-btn"
onclick='editEvent(
"${docItem.id}",
${JSON.stringify(event)}
)'>

Edit

</button>

<button
class="delete-btn"
onclick='deleteEvent(
"${docItem.id}"
)'>

Delete

</button>

</div>

</div>

`;

});

document.getElementById(
"eventList"
).innerHTML =
html;

}

window.editEvent =
function(id,event){

document.getElementById(
"eventName"
).value =
event.eventName;

document.getElementById(
"eventArea"
).value =
event.eventArea;

document.getElementById(
"eventTime"
).value =
event.eventTime;

document.getElementById(
"managerName"
).value =
event.managerName;

document.getElementById(
"coordinatorName"
).value =
event.coordinatorName;

document.getElementById(
"teamMembers"
).value =
event.teamMembers;

document.getElementById(
"assignStaff"
).value =
event.assignStaff;

document.getElementById(
"dutyType"
).value =
event.dutyType;

document.getElementById(
"eventDetails"
).value =
event.eventDetails;

editId = id;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

window.deleteEvent =
async function(id){

await deleteDoc(
doc(db,"events",id)
);

loadEvents();

}

loadStaffEmails();

loadEvents();

</script>

</body>

</html>
