<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AAQ Event ERP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#ca8a04,
#111827
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1400px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.back-btn{

padding:14px 24px;

border-radius:14px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.form-box{

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:28px;

backdrop-filter:blur(12px);

margin-bottom:25px;

border:1px solid rgba(255,255,255,0.12);

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:18px;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;

margin-bottom:8px;

color:#e2e8f0;

}

.input-group input,
.input-group select{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:rgba(255,255,255,0.12);

color:white;

font-size:15px;

outline:none;

}

.input-group input::placeholder{

color:#cbd5e1;

}

.add-btn,
.save-btn,
.edit-btn{

padding:14px;

border:none;

border-radius:14px;

font-weight:bold;

cursor:pointer;

color:white;

margin-top:10px;

}

.add-btn{

background:#2563eb;

width:100%;

}

.save-btn{

background:#22c55e;

width:100%;

}

.edit-btn{

background:#f59e0b;

}

.post-box{

background:rgba(255,255,255,0.06);

padding:20px;

border-radius:20px;

margin-top:20px;

border:1px solid rgba(255,255,255,0.08);

}

.post-title{

margin-bottom:15px;

color:#facc15;

font-size:20px;

}

.staff-item{

padding:12px;

background:rgba(255,255,255,0.08);

border-radius:10px;

margin-top:10px;

display:flex;

justify-content:space-between;

align-items:center;

gap:10px;

}

.remove-btn{

background:#ef4444;

border:none;

padding:8px 12px;

border-radius:8px;

color:white;

cursor:pointer;

font-size:13px;

}

.event-card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:25px;

margin-top:20px;

border:1px solid rgba(255,255,255,0.12);

}

.event-card h2{

color:#facc15;

margin-bottom:15px;

}

.event-card p{

margin-bottom:8px;

line-height:1.7;

}

.status{

display:inline-block;

padding:8px 15px;

border-radius:10px;

margin-top:15px;

font-weight:bold;

}

.active{

background:#22c55e;

}

.expired{

background:#ef4444;

}

.action-btns{

display:flex;

gap:10px;

margin-top:15px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>
AAQ Event ERP
</h1>

<p>
Professional Multi Staff Event Management
</p>

</div>

<a href="admin.html"
class="back-btn">

Back

</a>

</div>

<div class="form-box">

<div class="grid">

<div class="input-group">

<label>
Event Name
</label>

<input
type="text"
id="eventName"
placeholder="Enter Event Name">

</div>

<div class="input-group">

<label>
Event Address
</label>

<input
type="text"
id="eventAddress"
placeholder="Enter Event Address">

</div>

<div class="input-group">

<label>
Start Date
</label>

<input
type="date"
id="startDate">

</div>

<div class="input-group">

<label>
End Date
</label>

<input
type="date"
id="endDate">

</div>

<div class="input-group">

<label>
Event Coordinator
</label>

<input
type="text"
id="eventCoordinator">

</div>

<div class="input-group">

<label>
Access Manager
</label>

<input
type="text"
id="accessManager">

</div>

<div class="input-group">

<label>
Technical Team
</label>

<input
type="text"
id="technicalTeam">

</div>

</div>

<div id="postContainer"></div>

<button
class="add-btn"
onclick="addPost()">

+ Add Event Crew Post

</button>

<button
class="save-btn"
onclick="saveEvent()">

Save Event

</button>

</div>

<div id="eventList"></div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let currentEditId = null;

let totalPosts = 0;

async function loadStaffOptions(select){

const querySnapshot =
await getDocs(
collection(db,"staffs")
);

let options =
"<option value=''>Select Staff</option>";

querySnapshot.forEach((docItem)=>{

const staff =
docItem.data();

options += `

<option value="${staff.email}">

${staff.staffName}
-
${staff.email}

</option>

`;

});

select.innerHTML =
options;

}

window.addPost =
function(){

totalPosts++;

const div =
document.createElement("div");

div.className =
"post-box";

div.innerHTML = `

<h2 class="post-title">

Crew Post ${totalPosts}

</h2>

<div class="grid">

<div class="input-group">

<label>
Crew Post
</label>

<input
type="text"
class="crewPost">

</div>

<div class="input-group">

<label>
Duty Area
</label>

<input
type="text"
class="dutyArea">

</div>

<div class="input-group">

<label>
Post Coordinator
</label>

<input
type="text"
class="coordinator">

</div>

</div>

<div class="input-group">

<label>
Assign Staff
</label>

<select class="staffSelect"></select>

</div>

<button
type="button"
class="add-btn"
onclick="addStaff(this)">

+ Add Staff

</button>

<div class="selectedStaffList"></div>

`;

document.getElementById(
"postContainer"
).appendChild(div);

loadStaffOptions(
div.querySelector(".staffSelect")
);

}

window.addStaff =
function(button){

const postBox =
button.closest(".post-box");

const select =
postBox.querySelector(".staffSelect");

const email =
select.value;

if(!email){

return;

}

const list =
postBox.querySelector(
".selectedStaffList"
);

const exists =
Array.from(
list.querySelectorAll(".staff-email")
).some(

item =>

item.innerText.trim()

===

email.trim()

);

if(exists){

alert(
"Already Added"
);

return;

}

list.innerHTML += `

<div class="staff-item">

<span class="staff-email">

${email}

</span>

<button
class="remove-btn"
onclick="removeStaff(this)">

Remove

</button>

</div>

`;

}

window.removeStaff =
function(button){

button.parentElement.remove();

}

window.saveEvent =
async function(){

const posts = [];

document.querySelectorAll(
".post-box"
).forEach((post)=>{

const emails = [];

post.querySelectorAll(
".staff-email"
).forEach((item)=>{

emails.push(
item.innerText.trim()
);

});

posts.push({

crewPost:
post.querySelector(".crewPost").value,

dutyArea:
post.querySelector(".dutyArea").value,

coordinator:
post.querySelector(".coordinator").value,

staffEmails:
emails

});

});

const eventData = {

eventName:
document.getElementById("eventName").value,

eventAddress:
document.getElementById("eventAddress").value,

startDate:
document.getElementById("startDate").value,

endDate:
document.getElementById("endDate").value,

eventCoordinator:
document.getElementById("eventCoordinator").value,

accessManager:
document.getElementById("accessManager").value,

technicalTeam:
document.getElementById("technicalTeam").value,

posts

};

if(currentEditId){

await updateDoc(
doc(db,"events",currentEditId),
eventData
);

alert("Event Updated");

currentEditId = null;

}else{

await addDoc(
collection(db,"events"),
eventData
);

alert("Event Saved");

}

document.getElementById(
"eventName"
).value = "";

document.getElementById(
"eventAddress"
).value = "";

document.getElementById(
"startDate"
).value = "";

document.getElementById(
"endDate"
).value = "";

document.getElementById(
"eventCoordinator"
).value = "";

document.getElementById(
"accessManager"
).value = "";

document.getElementById(
"technicalTeam"
).value = "";

document.getElementById(
"postContainer"
).innerHTML = "";

addPost();

loadEvents();

}

window.editEvent =
async function(eventId){

currentEditId =
eventId;

const querySnapshot =
await getDocs(
collection(db,"events")
);

querySnapshot.forEach((docItem)=>{

if(docItem.id === eventId){

const event =
docItem.data();

document.getElementById(
"eventName"
).value =
event.eventName;

document.getElementById(
"eventAddress"
).value =
event.eventAddress;

document.getElementById(
"startDate"
).value =
event.startDate;

document.getElementById(
"endDate"
).value =
event.endDate;

document.getElementById(
"eventCoordinator"
).value =
event.eventCoordinator;

document.getElementById(
"accessManager"
).value =
event.accessManager;

document.getElementById(
"technicalTeam"
).value =
event.technicalTeam;

document.getElementById(
"postContainer"
).innerHTML = "";

event.posts.forEach((post)=>{

addPost();

const posts =
document.querySelectorAll(
".post-box"
);

const currentPost =
posts[posts.length - 1];

currentPost.querySelector(
".crewPost"
).value =
post.crewPost;

currentPost.querySelector(
".dutyArea"
).value =
post.dutyArea;

currentPost.querySelector(
".coordinator"
).value =
post.coordinator;

const list =
currentPost.querySelector(
".selectedStaffList"
);

post.staffEmails.forEach((email)=>{

list.innerHTML += `

<div class="staff-item">

<span class="staff-email">

${email}

</span>

<button
class="remove-btn"
onclick="removeStaff(this)">

Remove

</button>

</div>

`;

});

});

window.scrollTo({

top:0,
behavior:"smooth"

});

}

});

}

window.loadEvents =
async function(){

const querySnapshot =
await getDocs(
collection(db,"events")
);

let html = "";

querySnapshot.forEach((docItem)=>{

const event =
docItem.data();

const eventId =
docItem.id;

const today =
new Date()
.toISOString()
.split("T")[0];

const status =
today > event.endDate

?

"Expired"

:

"Active";

html += `

<div class="event-card">

<h2>
${event.eventName}
</h2>

<p>
📍 ${event.eventAddress}
</p>

<p>
📅 ${event.startDate}
To
${event.endDate}
</p>

<p>
👨 ${event.eventCoordinator}
</p>

<p>
🛡️ ${event.accessManager}
</p>

<p>
🖥️ ${event.technicalTeam}
</p>

<hr style="margin:15px 0;">

${event.posts.map(post=>`

<div class="staff-item">

<div>

<p>
💼 ${post.crewPost}
</p>

<p>
📍 ${post.dutyArea}
</p>

<p>
👨 ${post.coordinator}
</p>

<p>
👥 ${post.staffEmails.join(", ")}
</p>

</div>

</div>

`).join("")}

<div class="status ${status === "Active" ? "active" : "expired"}">

${status}

</div>

<div class="action-btns">

<button
class="edit-btn"
onclick="editEvent('${eventId}')">

Edit Event

</button>

</div>

</div>

`;

});

document.getElementById(
"eventList"
).innerHTML =
html;

}

addPost();

loadEvents();

</script>

</body>

</html>
