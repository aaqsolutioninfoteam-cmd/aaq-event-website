<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4318FF; --bg: #f4f7fe; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; }
        .filter-bar { background: white; padding: 15px; border-radius: 12px; display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        select, input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th { background: #f8f9fa; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .missing-punch { background: #fff5f5; border-left: 4px solid #e53e3e; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>

<div class="filter-bar">
    <i class="fa-solid fa-filter"></i>
    <select id="empDropdown" onchange="loadAttendance()">
        <option value="">Select Employee</option>
    </select>
    <select id="statusDropdown" onchange="loadAttendance()">
        <option value="">All Status</option>
        <option value="Approved">Approved</option>
        <option value="Pending">Pending</option>
    </select>
    <button onclick="loadAttendance()" class="btn">Refresh Data</button>
</div>

<div class="table-box">
    <table>
        <thead>
            <tr>
                <th>Emp Code</th>
                <th>Staff Name</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="attendanceTable"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { /* Apna Config Yahan Daalein */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // Admin Role Access (Ye Login se ayega)
    const IS_MANAGER = true; 

    // 1. Load Dropdowns dynamically
    async function initFilters() {
        const qs = await getDocs(collection(db, "attendance"));
        const empList = new Set();
        qs.forEach(d => empList.add(d.data().empCode)); // Employee Code filter
        const sel = document.getElementById("empDropdown");
        empList.forEach(code => sel.innerHTML += `<option value="${code}">${code}</option>`);
    }

    // 2. Main Load Function
    window.loadAttendance = async function() {
        const empFilter = document.getElementById("empDropdown").value;
        const qs = await getDocs(collection(db, "attendance"));
        let html = "";

        qs.forEach((d) => {
            const data = d.data();
            if(empFilter && data.empCode !== empFilter) return;

            const isMissing = !data.outTime;
            html += `
            <tr class="${isMissing ? 'missing-punch' : ''}">
                <td>${data.empCode || 'N/A'}</td>
                <td>${data.staffName}</td>
                <td>${data.date}</td>
                <td>${data.inTime} - ${data.outTime || '---'}</td>
                <td><span class="badge">${data.status}</span></td>
                <td>
                    ${IS_MANAGER ? `<button onclick="editRow('${d.id}')">Edit</button>` : 'View Only'}
                </td>
            </tr>`;
        });
        document.getElementById("attendanceTable").innerHTML = html;
    }

    initFilters();
    loadAttendance();
</script>
</body>
</html>
