<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.A.Q Solutions & Outsourcing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#111827);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:450px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.logo{
width:130px;
margin-bottom:15px;
filter:drop-shadow(0 0 15px rgba(255,255,255,0.2));
}

h1{
font-size:28px;
margin-bottom:10px;
}

.subtitle{
color:#d1d5db;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
color:white;
text-decoration:none;
}

.btn:hover{
transform:scale(1.03);
}

.feedback{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.complaint{
background:linear-gradient(135deg,#dc2626,#991b1b);
}

.booking{
background:linear-gradient(135deg,#ca8a04,#a16207);
}

.contact{
background:linear-gradient(135deg,#16a34a,#166534);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.popup-content{
background:#111827;
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
position:relative;
}

.popup-content h2{
margin-bottom:20px;
}

.close{
position:absolute;
right:15px;
top:10px;
font-size:28px;
cursor:pointer;
}

input,textarea,select{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#1f2937;
color:white;
}

textarea{
height:100px;
resize:none;
}

.submit-btn{
background:#f59e0b;
color:black;
font-weight:bold;
}

.footer{
margin-top:20px;
font-size:14px;
color:#d1d5db;
}

</style>
</head>

<body>

<div class="container">

<img src="ChatGPT Image May 13, 2026, 01_12_37 PM.png" class="logo" alt="AAQ Logo">
  
<h1>A.A.Q Solutions & Outsourcing</h1>

<p class="subtitle">
Professional Event Management Services
</p>

<button class="btn feedback"
onclick="openPopup('feedbackPopup')">
Feedback
</button>

<button class="btn complaint"
onclick="openPopup('complaintPopup')">
Complaint
</button>

<button class="btn booking"
onclick="openPopup('bookingPopup')">
Book Event
</button>

<a class="btn contact"
href="https://wa.me/917600263704"
target="_blank">
Contact Us
</a>

<div class="footer">
📞 +91 7600263704<br>
📧 aaqsolutioninfoteam@gmail.com
</div>

</div>

<!-- FEEDBACK POPUP -->

<div class="popup" id="feedbackPopup">

<div class="popup-content">

<span class="close"
onclick="closePopup('feedbackPopup')">
&times;
</span>

<h2>Client Feedback</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="1d7484dc-e1f8-4068-bb1b-c8feb65c788a">

<input type="hidden" name="subject" value="New Feedback Received">

<input type="text"
name="name"
placeholder="Full Name"
required>

<input type="tel"
name="mobile"
placeholder="Mobile Number"
required>

<input type="email"
name="email"
placeholder="Email Address"
required>

<select name="rating" required>

<option value="">
Select Rating
</option>

<option>⭐</option>
<option>⭐⭐</option>
<option>⭐⭐⭐</option>
<option>⭐⭐⭐⭐</option>
<option>⭐⭐⭐⭐⭐</option>

</select>

<textarea name="message"
placeholder="Your Feedback">
</textarea>

<button type="submit"
class="btn submit-btn">
Submit
</button>

</form>

</div>
</div>

<!-- COMPLAINT POPUP -->

<div class="popup" id="complaintPopup">

<div class="popup-content">

<span class="close"
onclick="closePopup('complaintPopup')">
&times;
</span>

<h2>Complaint Support</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="1d7484dc-e1f8-4068-bb1b-c8feb65c788a">

<input type="hidden" name="subject" value="New Complaint Received">

<input type="text"
name="name"
placeholder="Full Name"
required>

<input type="tel"
name="mobile"
placeholder="Mobile Number"
required>

<input type="email"
name="email"
placeholder="Email Address"
required>

<textarea name="message"
placeholder="Complaint Details">
</textarea>

<button type="submit"
class="btn submit-btn">
Submit
</button>

</form>

</div>
</div>

<!-- BOOKING POPUP -->

<div class="popup" id="bookingPopup">

<div class="popup-content">

<span class="close"
onclick="closePopup('bookingPopup')">
&times;
</span>

<h2>Book Event</h2>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="1d7484dc-e1f8-4068-bb1b-c8feb65c788a">

<input type="hidden" name="subject" value="New Event Booking">

<input type="text"
name="name"
placeholder="Full Name"
required>

<input type="tel"
name="mobile"
placeholder="Mobile Number"
required>

<input type="email"
name="email"
placeholder="Email Address"
required>

<select name="eventtype" required>

<option value="">
Select Event Type
</option>

<option>Webinar</option>
<option>Corporate Event</option>
<option>Religious Program</option>
<option>Live Streaming</option>
<option>Seminar</option>
<option>Meeting</option>

</select>

<textarea name="message"
placeholder="Event Details">
</textarea>

<button type="submit"
class="btn submit-btn">
Submit
</button>

</form>

</div>
</div>

<script>

function openPopup(id){
document.getElementById(id).style.display='flex';
}

function closePopup(id){
document.getElementById(id).style.display='none';
}

const forms = document.querySelectorAll("form");

forms.forEach(form => {

form.addEventListener("submit", function(){

const name = form.querySelector('input[name="name"]').value;

const subjectInput = form.querySelector('input[name="subject"]');

if(subjectInput.value.includes("Feedback")){
subjectInput.value = "New Feedback Received From " + name;
}

if(subjectInput.value.includes("Complaint")){
subjectInput.value = "New Complaint Received From " + name;
}

if(subjectInput.value.includes("Booking")){
subjectInput.value = "New Event Booking From " + name;
}

});

});

</script>

</body>
</html>
