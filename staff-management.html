<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AAQ Staff Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#111827,
#1e293b,
#0f172a
);

min-height:100vh;

color:white;

display:flex;

}

.sidebar{

width:260px;

background:rgba(255,255,255,0.06);

backdrop-filter:blur(15px);

padding:25px;

border-right:1px solid rgba(255,255,255,0.1);

position:fixed;

top:0;

left:0;

height:100vh;

overflow:auto;

}

.logo-box{

text-align:center;

margin-bottom:30px;

}

.logo{

width:90px;

margin-bottom:10px;

}

.logo-box h2{

font-size:24px;

margin-bottom:5px;

}

.logo-box p{

font-size:13px;

color:#cbd5e1;

}

.menu{

display:flex;

flex-direction:column;

gap:15px;

}

.menu button{

padding:15px;

border:none;

border-radius:14px;

background:rgba(255,255,255,0.08);

color:white;

font-size:15px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

text-align:left;

}

.menu button:hover{

background:
linear-gradient(
135deg,
#ca8a04,
#a16207
);

transform:translateX(5px);

}

.main{

margin-left:260px;

width:100%;

padding:25px;

}

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

background:rgba(255,255,255,0.06);

padding:18px 22px;

border-radius:18px;

backdrop-filter:blur(15px);

flex-wrap:wrap;

gap:15px;

}

.time-box{

font-size:14px;

line-height:1.6;

}

.logout{

background:#dc2626;

padding:12px 20px;

border:none;

border-radius:12px;

color:white;

font-weight:bold;

cursor:pointer;

}

.content-box{

background:rgba(255,255,255,0.06);

padding:30px;

border-radius:25px;

backdrop-filter:blur(15px);

margin-bottom:25px;

}

.content-box h2{

margin-bottom:20px;

font-size:26px;

}

input,
select{

width:100%;

padding:14px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#1e293b;

color:white;

font-size:15px;

}

.save-btn{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#ca8a04,
#a16207
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

.staff-list{

display:grid;

gap:20px;

}

.card{

background:rgba(255,255,255,0.06);

padding:22px;

border-radius:22px;

backdrop-filter:blur(15px);

}

.staff-row{

display:flex;

align-items:center;

gap:20px;

flex-wrap:wrap;

}

.staff-photo{

width:90px;

height:90px;

border-radius:50%;

object-fit:cover;

border:3px solid white;

}

.staff-details{

flex:1;

}

.staff-details h3{

margin-bottom:10px;

font-size:22px;

}

.staff-details p{

margin-bottom:7px;

font-size:14px;

color:#e2e8f0;

}

.action-buttons{

display:flex;

gap:10px;

margin-top:10px;

}

.edit-btn,
.delete-btn{

width:42px;

height:42px;

border:none;

border-radius:50%;

cursor:pointer;

font-size:18px;

color:white;

}

.edit-btn{

background:#2563eb;

}

.delete-btn{

background:#dc2626;

}

.popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.7);

justify-content:center;

align-items:center;

z-index:9999;

}

.popup-box{

background:#111827;

padding:25px;

border-radius:20px;

width:320px;

text-align:center;

}

.popup-buttons{

display:flex;

gap:10px;

margin-top:20px;

}

.popup-buttons button{

flex:1;

padding:12px;

border:none;

border-radius:10px;

color:white;

font-weight:bold;

cursor:pointer;

}

.confirm-btn{

background:#dc2626;

}

.cancel-btn{

background:#374151;

}

@media(max-width:900px){

body{

flex-direction:column;

}

.sidebar{

position:relative;

width:100%;

height:auto;

border-right:none;

}

.main{

margin-left:0;

}

.staff-row{

flex-direction:column;

text-align:center;

}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo-box">

<img src="logo.png"
class="logo">

<h2>AAQ ERP</h2>

<p>
Professional Management Panel
</p>

</div>

<div class="menu">

<button onclick="showSection('dashboard')">
🏠 Dashboard
</button>

<button onclick="showSection('staff')">
👨‍💼 Staff Management
</button>

<button onclick="showSection('attendance')">
📅 Attendance
</button>

<button onclick="showSection('events')">
🎉 Events
</button>

<button onclick="showSection('reports')">
📊 Reports
</button>

<button onclick="showSection('idcard')">
🪪 ID Card
</button>

<button onclick="showSection('settings')">
⚙️ Settings
</button>

</div>

</div>

<div class="main">

<div class="topbar">

<div class="time-box">

<div id="liveDate"></div>

<div id="liveTime"></div>

</div>

<button
onclick="logout()"
class="logout">

Logout

</button>

</div>

<div class="content-box"
id="mainContent">

<h2>
Staff Management
</h2>

<input type="text"
id="staffName"
placeholder="Staff Name">

<input type="tel"
id="mobile"
placeholder="Mobile Number">

<input type="email"
id="email"
placeholder="Email Address">

<input type="password"
id="password"
placeholder="Password">

<input type="text"
id="position"
placeholder="Position">

<input type="text"
id="address"
placeholder="Address">

<input type="text"
id="aadhaar"
placeholder="Aadhaar Number">

<input type="text"
id="staffId"
placeholder="ID Card Number">

<input type="file"
id="photo">

<select id="status">

<option>
Select Status
</option>

<option>
Active
</option>

<option>
Inactive
</option>

</select>

<button
onclick="saveStaff()"
class="save-btn">

Save Staff

</button>

</div>

<div class="staff-list"
id="staffList">

</div>

</div>

<div class="popup"
id="deletePopup">

<div class="popup-box">

<h2>
Delete Staff?
</h2>

<p style="margin-top:10px;">
Are you sure?
</p>

<div class="popup-buttons">

<button
class="confirm-btn"
onclick="confirmDelete()">

Confirm

</button>

<button
class="cancel-btn"
onclick="closePopup()">

Cancel

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let editId = null;

let deleteId = null;

window.currentPhoto = "";

window.saveStaff =
async function(){

const staffName =
document.getElementById("staffName").value;

const mobile =
document.getElementById("mobile").value;

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const position =
document.getElementById("position").value;

const address =
document.getElementById("address").value;

const aadhaar =
document.getElementById("aadhaar").value;

const staffId =
document.getElementById("staffId").value;

const status =
document.getElementById("status").value;

const photo =
document.getElementById("photo").files[0];

let photoURL =
window.currentPhoto || "";

if(photo){

const reader = new FileReader();

reader.onload = async function(e){

photoURL = e.target.result;

await saveStaffData(
staffName,
mobile,
email,
password,
position,
address,
aadhaar,
staffId,
status,
photoURL
);

};

reader.readAsDataURL(photo);

}else{

await saveStaffData(
staffName,
mobile,
email,
password,
position,
address,
aadhaar,
staffId,
status,
photoURL
);

}

}

async function saveStaffData(
staffName,
mobile,
email,
password,
position,
address,
aadhaar,
staffId,
status,
photoURL
){

try{

if(editId){

await updateDoc(
doc(db,"staffs",editId),
{
staffName,
mobile,
email,
password,
position,
address,
aadhaar,
staffId,
status,
photoURL
}
);

alert("Staff Updated");

editId = null;

}else{

await addDoc(
collection(db,"staffs"),
{
staffName,
mobile,
email,
password,
position,
address,
aadhaar,
staffId,
status,
photoURL
}
);

alert("Staff Added");

}

document.querySelectorAll("input").forEach((input)=>{
input.value = "";
});

document.getElementById(
"status"
).value = "Select Status";

document.getElementById(
"photo"
).value = "";

window.currentPhoto = "";

loadStaff();

}catch(error){

alert(error);

console.log(error);

}

}

window.editStaff =
function(id,data){

document.getElementById(
"staffName"
).value = data.staffName;

document.getElementById(
"mobile"
).value = data.mobile;

document.getElementById(
"email"
).value = data.email;

document.getElementById(
"password"
).value = data.password;

document.getElementById(
"position"
).value = data.position;

document.getElementById(
"address"
).value = data.address;

document.getElementById(
"aadhaar"
).value = data.aadhaar;

document.getElementById(
"staffId"
).value = data.staffId;

document.getElementById(
"status"
).value = data.status;

window.currentPhoto =
data.photoURL || "";

editId = id;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

window.deleteStaff =
function(id){

deleteId = id;

document.getElementById(
"deletePopup"
).style.display = "flex";

}

window.closePopup =
function(){

document.getElementById(
"deletePopup"
).style.display = "none";

}

window.confirmDelete =
async function(){

await deleteDoc(
doc(db,"staffs",deleteId)
);

closePopup();

loadStaff();

}

async function loadStaff(){

const querySnapshot =
await getDocs(
collection(db,"staffs")
);

let html = "";

querySnapshot.forEach((docItem)=>{

const data =
docItem.data();

html += `

<div class="card">

<div class="staff-row">

<img
src="${
data.photoURL ||
'https://i.imgur.com/6VBx3io.png'
}"
class="staff-photo">

<div class="staff-details">

<h3>
${data.staffName}
</h3>

<p>
📱 ${data.mobile}
</p>

<p>
📧 ${data.email}
</p>

<p>
💼 ${data.position}
</p>

<p>
🪪 ${data.staffId}
</p>

<p>
📍 ${data.address}
</p>

<p>
✅ ${data.status}
</p>

<div class="action-buttons">

<button
class="edit-btn"
onclick='editStaff(
"${docItem.id}",
${JSON.stringify(data)}
)'>

✏️

</button>

<button
class="delete-btn"
onclick='deleteStaff(
"${docItem.id}"
)'>

🗑️

</button>

</div>

</div>

</div>

</div>

`;

});

document.getElementById(
"staffList"
).innerHTML = html;

}

loadStaff();

function updateDateTime(){

const now = new Date();

document.getElementById(
"liveDate"
).innerHTML =
"📅 " +
now.toLocaleDateString();

document.getElementById(
"liveTime"
).innerHTML =
"🕒 " +
now.toLocaleTimeString();

}

setInterval(updateDateTime,1000);

updateDateTime();

function logout(){

localStorage.clear();

window.location.href =
"login.html";

}

window.logout = logout;

window.showSection = function(name){

alert(name + " Section Coming Soon");

}

</script>

</body>

  </html>
