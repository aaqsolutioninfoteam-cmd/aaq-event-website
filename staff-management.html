<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Management - Premium Admin Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #0f172a; 
            min-height: 100vh; 
            padding: 25px; 
            color: #f8fafc; 
        }
        
        .container { max-width: 1300px; margin: auto; }

        /* Premium Glassmorphic Header */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(30, 41, 59, 0.7); 
            padding: 20px 30px; 
            border-radius: 20px; 
            backdrop-filter: blur(16px); 
            margin-bottom: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box h2 { font-size: 22px; font-weight: 700; color: #f59e0b; }
        .logo-box p { font-size: 13px; color: #94a3b8; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .live-box { text-align: right; font-size: 13px; color: #cbd5e1; font-weight: 500; }
        #liveTime { font-size: 16px; font-weight: 700; color: #f59e0b; margin-top: 2px; }
        .back-btn { 
            background: #ef4444; 
            padding: 10px 20px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white; 
            font-weight: 600; 
            font-size: 14px;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #dc2626; transform: translateY(-1px); }

        /* Master Dashboard Split Layout */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 30px; 
        }
        @media (min-width: 950px) { 
            .dashboard-grid { grid-template-columns: 420px 1fr; } 
        }

        /* Modern Form Container */
        .form-box { 
            background: rgba(30, 41, 59, 0.5); 
            padding: 25px; 
            border-radius: 24px; 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: fit-content;
        }
        .form-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #f8fafc; display: flex; align-items: center; gap: 8px; }
        
        .input-group { position: relative; margin-bottom: 16px; }
        .input-group i { position: absolute; left: 14px; top: 15px; color: #64748b; font-size: 15px; }
        
        input, select { 
            width: 100%; 
            padding: 14px 14px 14px 42px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 12px; 
            background: #0f172a; 
            color: white; 
            font-size: 14px; 
            outline: none;
            transition: all 0.2s;
        }
        input[type="file"] { padding-left: 14px; }
        input:focus, select:focus { border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15); }
        
        .file-label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }

        .save-btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: #0f172a; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s;
            margin-top: 10px;
        }
        .save-btn:hover { opacity: 0.95; transform: translateY(-1px); }

        /* Modern Grid Architecture for Cards */
        .staff-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; align-content: start; }
        
        .card { 
            background: rgba(30, 41, 59, 0.4); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-4px); border-color: rgba(245, 158, 11, 0.3); }
        
        .staff-row { display: flex; gap: 16px; align-items: flex-start; }
        .staff-photo { width: 70px; height: 70px; border-radius: 14px; object-fit: cover; border: 2px solid rgba(255, 255, 255, 0.1); }
        
        .staff-details { flex: 1; }
        .staff-details h3 { font-size: 16px; font-weight: 700; color: #ffffff; margin-bottom: 2px; }
        .staff-details .role-badge { font-size: 12px; color: #f59e0b; font-weight: 600; margin-bottom: 12px; display: block; }
        
        .info-line { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #cbd5e1; margin-bottom: 6px; }
        .info-line i { color: #64748b; width: 16px; text-align: center; }

        .status-pill { 
            display: inline-block; 
            padding: 4px 8px; 
            border-radius: 6px; 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase;
            margin-top: 6px;
        }
        .status-active { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .status-inactive { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        /* Actions Container Inside Card */
        .action-buttons { display: flex; gap: 8px; position: absolute; top: 15px; right: 15px; }
        .action-btn { 
            width: 32px; 
            height: 32px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 14px; 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .edit-btn { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .edit-btn:hover { background: #3b82f6; color: white; }
        .delete-btn { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        .delete-btn:hover { background: #ef4444; color: white; }

        /* Smart Popup Modals */
        .popup { 
            display:none; 
            position:fixed; 
            top:0; left:0; width:100%; height:100%; 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(4px); 
            justify-content:center; align-items:center; 
            z-index:9999; 
        }
        .popup-box { 
            background: #1e293b; 
            padding: 25px; 
            border-radius: 20px; 
            width: 340px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .popup-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .popup-box p { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }
        .popup-buttons { display: flex; gap: 10px; }
        .popup-buttons button { flex: 1; padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
        .confirm-btn { background: #ef4444; }
        .cancel-btn { background: #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-box">
            <div>
                <h2>Staff Administration</h2>
                <p>AAQ Event Management ERP</p>
            </div>
        </div>
        <div class="header-right">
            <div class="live-box">
                <div id="liveDate">📅 --/--/----</div>
                <div id="liveTime">🕒 00:00:00</div>
            </div>
            <a href="admin.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="form-box">
            <h2 id="formTitle"><i class="fa-solid fa-user-plus" style="color: #f59e0b;"></i> Register New Staff</h2>
            
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="staffName" placeholder="Staff Full Name">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="mobile" placeholder="Mobile Number">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Account Password">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-id-badge"></i>
                <input type="text" id="position" placeholder="Job Position / Role">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" id="address" placeholder="Residential Address">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-address-card"></i>
                <input type="text" id="aadhaar" placeholder="Identification Document Number">
            </div>
            <div class="input-group">
                <i class="fa-solid fa-fingerprint"></i>
                <input type="text" id="staffId" placeholder="Internal ID Card Number">
            </div>
            
            <span class="file-label">Profile Image Attachment</span>
            <div class="input-group" style="margin-bottom:12px;">
                <input type="file" id="photo">
            </div>

            <div class="input-group" style="padding-left:0;">
                <i class="fa-solid fa-toggle-on"></i>
                <select id="status" style="padding-left: 42px;">
                    <option value="Select Status">Select Status</option>
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>

            <button type="button" onclick="saveStaff()" class="save-btn">Save Profile Data</button>
        </div>

        <div class="staff-list" id="staffList">
            </div>
    </div>
</div>

<div class="popup" id="deletePopup">
    <div class="popup-box">
        <h3>Remove Employee Profile?</h3>
        <p>This will permanently erase the records from database.</p>
        <div class="popup-buttons">
            <button class="confirm-btn" onclick="confirmDelete()">Delete</button>
            <button class="cancel-btn" onclick="closePopup()">Cancel</button>
        </div>
    </div>
</div>

<script>
    window.dbRecordsCache = {};
</script>

<script type="module">
    localStorage.setItem("loggedUser", "Admin");
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",
        authDomain: "aaq-event-erp.firebaseapp.com",
        projectId: "aaq-event-erp",
        storageBucket: "aaq-event-erp.firebasestorage.app",
        messagingSenderId: "985636664002",
        appId: "1:985636664002:web:4b941d3562609d2058815b",
        measurementId: "G-HHD049KDS8"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let editId = null;
    let deleteId = null;
    window.currentPhoto = "";
    
    window.saveStaff = async function(){
        const staffName = document.getElementById("staffName").value;
        const mobile = document.getElementById("mobile").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const position = document.getElementById("position").value;
        const address = document.getElementById("address").value;
        const aadhaar = document.getElementById("aadhaar").value;
        const staffId = document.getElementById("staffId").value;
        const status = document.getElementById("status").value;
        const photo = document.getElementById("photo").files[0];
        
        let photoURL = window.currentPhoto || "";
        
        if(photo){
            const formData = new FormData();
            formData.append("file", photo);
            formData.append("upload_preset", "aaqstaff");
            
            try {
                const response = await fetch("https://api.cloudinary.com/v1_1/dcwxyosh8/image/upload", {
                    method: "POST",
                    body: formData
                });
                const result = await response.json();
                photoURL = result.secure_url;
            } catch(e) {
                alert("Cloudinary Upload Failure");
            }
        } 
        
        try {
            const documentPayload = { staffName, mobile, email, password, position, address, aadhaar, staffId, status, photoURL };
            
            if(editId){
                await updateDoc(doc(db, "staffs", editId), documentPayload);
                alert("Staff Profile Synced Successfully");
                editId = null;
                document.getElementById("formTitle").innerHTML = `<i class="fa-solid fa-user-plus" style="color: #f59e0b;"></i> Register New Staff`;
            } else {
                await addDoc(collection(db, "staffs"), documentPayload);
                alert("Staff Registered to Database");
            }
            
            document.querySelectorAll("input").forEach(input => input.value = "");
            document.getElementById("status").value = "Select Status";
            window.currentPhoto = "";
            loadStaff();
        } catch(error) {
            alert(error);
        }
    };
    
    window.editStaff = function(id){
        const data = window.dbRecordsCache[id];
        if(!data) return;

        document.getElementById("staffName").value = data.staffName || "";
        document.getElementById("mobile").value = data.mobile || "";
        document.getElementById("email").value = data.email || "";
        document.getElementById("password").value = data.password || "";
        document.getElementById("position").value = data.position || "";
        document.getElementById("address").value = data.address || "";
        document.getElementById("aadhaar").value = data.aadhaar || "";
        document.getElementById("staffId").value = data.staffId || "";
        document.getElementById("status").value = data.status || "Select Status";
        
        window.currentPhoto = data.photoURL || "";
        editId = id;
        
        document.getElementById("formTitle").innerHTML = `<i class="fa-solid fa-user-pen" style="color: #f59e0b;"></i> Edit Staff Profile`;
        window.scrollTo({ top: 0, behavior: "smooth" });
    };
    
    window.deleteStaff = function(id){
        deleteId = id;
        document.getElementById("deletePopup").style.display = "flex";
    };
    
    window.closePopup = function(){
        document.getElementById("deletePopup").style.display = "none";
    };
    
    window.confirmDelete = async function(){
        if(!deleteId) return;
        await deleteDoc(doc(db, "staffs", deleteId));
        closePopup();
        loadStaff();
    };
    
    async function loadStaff(){
        const querySnapshot = await getDocs(collection(db, "staffs"));
        let html = "";
        window.dbRecordsCache = {}; // Cache clear process
        
        querySnapshot.forEach((docItem)=>{
            const id = docItem.id;
            const data = docItem.data();
            window.dbRecordsCache[id] = data; // Cache storage maps mapping dynamically safely
            
            const statusClass = data.status === "Active" ? "status-active" : "status-inactive";
            
            html += `
                <div class="card">
                    <div class="action-buttons">
                        <button class="action-btn edit-btn" onclick="editStaff('${id}')"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="action-btn delete-btn" onclick="deleteStaff('${id}')"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                    <div class="staff-row">
                        <img src="${data.photoURL || 'https://i.imgur.com/6VBx3io.png'}" class="staff-photo">
                        <div class="staff-details">
                            <h3>${data.staffName || "Unnamed User"}</h3>
                            <span class="role-badge">${data.position || "General Staff"}</span>
                            
                            <div class="info-line"><i class="fa-solid fa-phone"></i> ${data.mobile || "-"}</div>
                            <div class="info-line"><i class="fa-solid fa-envelope"></i> ${data.email || "-"}</div>
                            <div class="info-line"><i class="fa-solid fa-fingerprint"></i> ID: ${data.staffId || "-"}</div>
                            <div class="info-line"><i class="fa-solid fa-address-card"></i> Doc: ${data.aadhaar || "-"}</div>
                            <div class="info-line"><i class="fa-solid fa-location-dot"></i> ${data.address || "-"}</div>
                            
                            <span class="status-pill ${statusClass}">${data.status || "Inactive"}</span>
                        </div>
                    </div>
                </div>`;
        });
        
        document.getElementById("staffList").innerHTML = html || `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#64748b;">No active employee directory found.</div>`;
    }
    
    loadStaff();
    
    function updateDateTime(){
        const now = new Date();
        document.getElementById("liveDate").innerHTML = "📅 " + now.toLocaleDateString();
        document.getElementById("liveTime").innerHTML = "🕒 " + now.toLocaleTimeString();
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();
</script>

</body>
</html>
