<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Event Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#1e3a8a,
#0f172a,
#ca8a04,
#1e293b
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1350px;

margin:auto;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

flex-wrap:wrap;

gap:15px;

}

.back-btn{

padding:14px 24px;

border-radius:14px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.form-box{

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:28px;

backdrop-filter:blur(12px);

margin-bottom:25px;

border:1px solid rgba(255,255,255,0.12);

}

.form-box h2{

margin-bottom:20px;

color:#facc15;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:18px;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;

margin-bottom:8px;

color:#e2e8f0;

}

.input-group input,
.input-group textarea,
.input-group select{

width:100%;

padding:13px;

border:none;

border-radius:12px;

background:rgba(255,255,255,0.12);

color:white;

font-size:15px;

outline:none;

}

textarea{

height:120px;

resize:none;

}

.save-btn{

width:100%;

padding:16px;

border:none;

border-radius:15px;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

font-size:17px;

font-weight:bold;

cursor:pointer;

margin-top:15px;

}

.event-list{

display:grid;

gap:22px;

}

.card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:28px;

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.12);

}

.card h2{

margin-bottom:15px;

color:#facc15;

}

.card p{

margin-bottom:10px;

line-height:1.7;

color:#e2e8f0;

}

.status{

display:inline-block;

padding:8px 15px;

border-radius:10px;

background:#22c55e;

font-weight:bold;

margin-top:10px;

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<h1>
Event Management
</h1>

<p>
Professional ERP Event Control
</p>

</div>

<a href="admin.html"
class="back-btn">

Back To Admin

</a>

</div>

<div class="form-box">

<h2>
Create Event Duty
</h2>

<div class="grid">

<div class="input-group">

<label>
Event Name
</label>

<input
type="text"
id="eventName"
placeholder="Surat Ijtema">

</div>

<div class="input-group">

<label>
Event Area
</label>

<input
type="text"
id="eventArea"
placeholder="Main Gate">

</div>

<div class="input-group">

<label>
Duty Time
</label>

<input
type="text"
id="eventTime"
placeholder="09:00 AM To 06:00 PM">

</div>

<div class="input-group">

<label>
Manager Name
</label>

<input
type="text"
id="managerName"
placeholder="Arman Bhai">

</div>

<div class="input-group">

<label>
Coordinator Name
</label>

<input
type="text"
id="coordinatorName"
placeholder="Salman Bhai">

</div>

<div class="input-group">

<label>
Team Members
</label>

<input
type="text"
id="teamMembers"
placeholder="Faizan, Imran, Sohail">

</div>

<div class="input-group">

<label>
Assign Staff
</label>

<input
type="text"
id="assignStaff"
placeholder="Staff Name">

</div>

<div class="input-group">

<label>
Duty Type
</label>

<select id="dutyType">

<option>
Reception
</option>

<option>
Security
</option>

<option>
Stage Control
</option>

<option>
Parking
</option>

<option>
Entry Gate
</option>

</select>

</div>

<div class="input-group">

<label>
Event Status
</label>

<select id="eventStatus">

<option>
Active
</option>

<option>
Pending
</option>

<option>
Completed
</option>

</select>

</div>

</div>

<div class="input-group">

<label>
Event Details
</label>

<textarea
id="eventDetails"
placeholder="Write Event Details..."></textarea>

</div>

<button
onclick="saveEvent()"
class="save-btn">

Save Event Duty

</button>

</div>

<div
class="event-list"
id="eventList">

</div>

</div>

<script>

function saveEvent(){

const events =
JSON.parse(
localStorage.getItem("events")
) || [];

events.push({

eventName:
document.getElementById("eventName").value,

eventArea:
document.getElementById("eventArea").value,

eventTime:
document.getElementById("eventTime").value,

managerName:
document.getElementById("managerName").value,

coordinatorName:
document.getElementById("coordinatorName").value,

teamMembers:
document.getElementById("teamMembers").value,

assignStaff:
document.getElementById("assignStaff").value,

dutyType:
document.getElementById("dutyType").value,

eventStatus:
document.getElementById("eventStatus").value,

eventDetails:
document.getElementById("eventDetails").value

});

localStorage.setItem(
"events",
JSON.stringify(events)
);

alert("Event Duty Saved");

loadEvents();

}

function loadEvents(){

const events =
JSON.parse(
localStorage.getItem("events")
) || [];

let html = "";

events.forEach((event)=>{

html += `

<div class="card">

<h2>
${event.eventName}
</h2>

<p>
📍 Area :
${event.eventArea}
</p>

<p>
🕒 Duty Time :
${event.eventTime}
</p>

<p>
👔 Manager :
${event.managerName}
</p>

<p>
👨 Coordinator :
${event.coordinatorName}
</p>

<p>
👥 Team :
${event.teamMembers}
</p>

<p>
🧾 Duty :
${event.dutyType}
</p>

<p>
👤 Staff :
${event.assignStaff}
</p>

<p>
📝 Details :
${event.eventDetails}
</p>

<div class="status">

${event.eventStatus}

</div>

</div>

`;

});

document.getElementById(
"eventList"
).innerHTML =
html;

}

loadEvents();

</script>

</body>

  </html>
