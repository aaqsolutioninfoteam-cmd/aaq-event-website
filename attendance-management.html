<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#dbeafe,
#fef3c7,
#ffffff
);

min-height:100vh;

padding:20px;

color:#0f172a;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

gap:15px;

}

.header h1{

font-size:32px;

}

.back-btn{

padding:12px 22px;

border-radius:14px;

background:
linear-gradient(
135deg,
#facc15,
#eab308
);

text-decoration:none;

font-weight:bold;

color:#111827;

}

.filter-box{

background:white;

padding:20px;

border-radius:20px;

margin-bottom:25px;

box-shadow:
0 10px 25px rgba(0,0,0,0.08);

}

.filter-box input{

padding:12px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:16px;

}

.attendance-list{

display:grid;

gap:20px;

}

.card{

background:white;

padding:20px;

border-radius:25px;

box-shadow:
0 10px 25px rgba(0,0,0,0.08);

display:flex;

align-items:center;

gap:20px;

flex-wrap:wrap;

}

.photo{

width:90px;

height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid #facc15;

}

.details{

flex:1;

}

.details h3{

margin-bottom:10px;

font-size:24px;

}

.details p{

margin-bottom:7px;

color:#475569;

}

.status{

padding:10px 18px;

border-radius:12px;

color:white;

font-weight:bold;

background:#22c55e;

}

</style>

</head>

<body>

<div class="header">

<h1>
Attendance Management
</h1>

<a href="admin.html"
class="back-btn">

Back

</a>

</div>

<div class="filter-box">

<input
type="date"
id="filterDate"
onchange="loadAttendance()">

</div>

<div
id="attendanceList"
class="attendance-list">

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(db,"attendance")
);

let html = "";

const selectedDate =
document.getElementById(
"filterDate"
).value;

querySnapshot.forEach((docItem)=>{

const data =
docItem.data();

if(selectedDate){

const formatted =
new Date(selectedDate)
.toLocaleDateString();

if(data.date !== formatted){

return;

}

}

html += `

<div class="card">

<img
src="${
data.staffPhoto ||
'https://i.imgur.com/6VBx3io.png'
}"
class="photo">

<div class="details">

<h3>
${data.staffName}
</h3>

<p>
💼 ${data.staffPosition}
</p>

<p>
📅 ${data.date}
</p>

<p>
🟢 IN :
${data.inTime || '--'}
</p>

<p>
🔴 OUT :
${data.outTime || '--'}
</p>

<p>
⏱️ TOTAL :
${data.totalHours || '--'}
</p>

</div>

<div class="status">

${data.status}

</div>

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML = html;

}

loadAttendance();

</script>

</body>

</html>
