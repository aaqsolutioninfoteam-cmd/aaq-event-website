<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Premium Attendance Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #f8fafc; padding: 30px; color: #0f172a; }
        .admin-container { max-width: 1400px; margin: auto; }
        
        /* Premium Header Styling */
        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .header-title h2 { font-size: 28px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 12px; }
        .header-title p { color: #64748b; font-size: 14px; margin-top: 4px; }

        /* Modern Glassmorphic Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 24px; margin-bottom: 35px; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .info h3 { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .stat-card .info h1 { font-size: 32px; margin-top: 8px; font-weight: 700; color: #1e293b; }
        .stat-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Dynamic Border Colors based on Status */
        .total-card { border-left: 5px solid #3b82f6; } .total-card .stat-icon { background: #eff6ff; color: #3b82f6; }
        .pending-card { border-left: 5px solid #f59e0b; } .pending-card .stat-icon { background: #fef3c7; color: #f59e0b; }
        .approved-card { border-left: 5px solid #10b981; } .approved-card .stat-icon { background: #ecfdf5; color: #10b981; }
        .rejected-card { border-left: 5px solid #ef4444; } .rejected-card .stat-icon { background: #fef2f2; color: #ef4444; }

        /* Sleek Filter Section */
        .filter-bar { background: white; padding: 20px; border-radius: 16px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border: 1px solid #e2e8f0; box-shadow: 0 2px 12px rgba(0,0,0,0.01); }
        .input-group { display: flex; align-items: center; background: #f1f5f9; border-radius: 10px; padding: 2px 12px; flex: 1; min-width: 200px; border: 1px solid transparent; }
        .input-group:focus-within { border-color: #3b82f6; background: white; }
        .input-group i { color: #94a3b8; margin-right: 8px; }
        .input-group input, .input-group select { background: transparent; border: none; padding: 10px 4px; width: 100%; outline: none; font-size: 14px; color: #334155; }

        /* Premium Table Design */
        .table-container { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 25px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 18px 20px; border-bottom: 2px solid #f1f5f9; color: #475569; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 18px 20px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #334155; vertical-align: middle; }
        tr:hover { background-color: #f8fafc; }
        
        /* Modern Button Engine */
        .btn { padding: 10px 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; transition: all 0.2s; }
        .btn-export { background: #1e293b; color: white; box-shadow: 0 4px 12px rgba(30,41,59,0.15); }
        .btn-export:hover { background: #0f172a; }
        
        /* Action Table Buttons */
        .action-btn { width: 36px; height: 36px; border-radius: 8px; border: none; cursor: pointer; color: white; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; margin-right: 4px; }
        .btn-approve { background: #10b981; } .btn-approve:hover { background: #059669; box-shadow: 0 4px 10px rgba(16,185,129,0.2); }
        .btn-reject { background: #ef4444; } .btn-reject:hover { background: #dc2626; box-shadow: 0 4px 10px rgba(239,68,68,0.2); }
        .btn-map { background: #0ea5e9; } .btn-map:hover { background: #0284c7; box-shadow: 0 4px 10px rgba(14,165,233,0.2); }
        
        /* Status Badges */
        .status-badge { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; display: inline-block; text-transform: capitalize; }
        .pending { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
        .approved { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
        .rejected { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        
        /* Staff Profile Block */
        .staff-profile { display:flex; align-items:center; gap:12px; }
        img.thumb { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; border: 2px solid #e2e8f0; }
        .staff-info b { font-size: 15px; color: #1e293b; }
        .staff-info small { color: #64748b; font-size: 12px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div class="header-title">
            <h2><i class="fa-solid fa-shield-halved" style="color: #3b82f6;"></i> Attendance Command Center</h2>
            <p>Monitor staff check-ins, geo-locations, and streamline approvals.</p>
        </div>
        <button class="btn btn-export" onclick="exportMasterData()">
            <i class="fa-solid fa-file-csv"></i> Export Master Data
        </button>
    </div>

    <div class="stats-grid">
        <div class="stat-card total-card">
            <div class="info"><h3>Total Logs</h3><h1 id="statTotal">0</h1></div>
            <div class="stat-icon"><i class="fa-solid fa-folder-open"></i></div>
        </div>
        <div class="stat-card pending-card">
            <div class="info"><h3>Pending Requests</h3><h1 id="statPending">0</h1></div>
            <div class="stat-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
        </div>
        <div class="stat-card approved-card">
            <div class="info"><h3>Approved Logs</h3><h1 id="statApproved">0</h1></div>
            <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
        </div>
        <div class="stat-card rejected-card">
            <div class="info"><h3>Rejected Logs</h3><h1 id="statRejected">0</h1></div>
            <div class="stat-icon"><i class="fa-solid fa-circle-xmark"></i></div>
        </div>
    </div>

    <div class="filter-bar">
        <div class="input-group">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchName" placeholder="Search staff name..." oninput="filterData()">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-calendar-days"></i>
            <input type="date" id="searchDate" onchange="filterData()">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-filter"></i>
            <select id="statusFilter" onchange="filterData()">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Staff Profile</th>
                    <th>Date</th>
                    <th>Punch In</th>
                    <th>Punch Out</th>
                    <th>Duration</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",
        authDomain: "aaq-event-erp.firebaseapp.com",
        projectId: "aaq-event-erp",
        storageBucket: "aaq-event-erp.firebasestorage.app",
        messagingSenderId: "985636664002",
        appId: "1:985636664002:web:4b941d3562609d2058815b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allData = [];

    async function loadAdminData() {
        try {
            const q = query(collection(db, "attendance"), orderBy("date", "desc"));
            const querySnapshot = await getDocs(q);
            allData = [];
            querySnapshot.forEach(doc => {
                allData.push({ id: doc.id, ...doc.data() });
            });
            renderTable(allData);
            updateStats();
        } catch(err) {
            console.error("Error loading data: ", err);
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById("adminTableBody");
        tbody.innerHTML = "";
        
        if(data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:30px; color:#94a3b8;">No attendance records found.</td></tr>`;
            return;
        }

        data.forEach(item => {
            const row = `
                <tr>
                    <td>
                        <div class="staff-profile">
                            <img src="${item.staffPhoto || 'https://via.placeholder.com/44'}" class="thumb">
                            <div class="staff-info">
                                <b>${item.staffName || 'Unknown'}</b><br>
                                <small>${item.staffPosition || 'Staff Member'}</small>
                            </div>
                        </div>
                    </td>
                    <td><i class="fa-regular fa-calendar" style="color:#64748b; margin-right:5px;"></i> ${item.date}</td>
                    <td><span style="color:#10b981; font-weight:500;"><i class="fa-solid fa-right-to-bracket"></i> ${item.inTime}</span></td>
                    <td><span style="color:${item.outTime ? '#ef4444' : '#94a3b8'}; font-weight:500;"><i class="fa-solid fa-right-from-bracket"></i> ${item.outTime || '--:--'}</span></td>
                    <td><strong>${item.totalHours || '0'} hrs</strong></td>
                    <td><span class="status-badge ${item.status ? item.status.toLowerCase() : 'pending'}">${item.status || 'Pending'}</span></td>
                    <td>
                        <button class="action-btn btn-approve" title="Approve" onclick="changeStatus('${item.id}', 'Approved')"><i class="fa-solid fa-check"></i></button>
                        <button class="action-btn btn-reject" title="Reject" onclick="changeStatus('${item.id}', 'Rejected')"><i class="fa-solid fa-xmark"></i></button>
                        <button class="action-btn btn-map" title="View Location" onclick="viewMap('${item.inLat}', '${item.inLng}')"><i class="fa-solid fa-location-dot"></i></button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    window.changeStatus = async (id, newStatus) => {
        const docRef = doc(db, "attendance", id);
        await updateDoc(docRef, { status: newStatus });
        loadAdminData();
    };

    window.viewMap = (lat, lng) => {
        if(lat && lat !== 'undefined') window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
        else alert("Live location data not captured for this punch-in.");
    };

    function updateStats() {
        document.getElementById("statTotal").innerText = allData.length;
        document.getElementById("statPending").innerText = allData.filter(d => d.status === "Pending" || !d.status).length;
        document.getElementById("statApproved").innerText = allData.filter(d => d.status === "Approved").length;
        document.getElementById("statRejected").innerText = allData.filter(d => d.status === "Rejected").length;
    }

    window.filterData = () => {
        const name = document.getElementById("searchName").value.toLowerCase();
        const date = document.getElementById("searchDate").value;
        const status = document.getElementById("statusFilter").value;

        const filtered = allData.filter(item => {
            const matchesName = item.staffName ? item.staffName.toLowerCase().includes(name) : false;
            const matchesDate = !date || (item.date && item.date.includes(date));
            const matchesStatus = !status || item.status === status;
            return matchesName && matchesDate && matchesStatus;
        });
        renderTable(filtered);
    };

    window.exportMasterData = () => {
        let csv = "Name,Position,Date,In Time,Out Time,Total Hours,Status\n";
        allData.forEach(d => {
            csv += `"${d.staffName || ''}","${d.staffPosition || ''}","${d.date || ''}","${d.inTime || ''}","${d.outTime || ''}","${d.totalHours || '0'}","${d.status || 'Pending'}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Master_Attendance_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
    };

    loadAdminData();
</script>
</body>
</html>
