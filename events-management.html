<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AAQ Event ERP
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#ca8a04,
#111827
);

background-size:400% 400%;

animation:bgMove 15s ease infinite;

min-height:100vh;

padding:20px;

color:white;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

max-width:1400px;

margin:auto;

}

.form-box{

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:25px;

backdrop-filter:blur(10px);

margin-bottom:25px;

}

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:15px;

}

input,
select{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:rgba(255,255,255,0.12);

color:white;

margin-top:10px;

}

button{

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

margin-top:10px;

}

.add-btn{

background:#2563eb;

color:white;

width:100%;

}

.save-btn{

background:#22c55e;

color:white;

width:100%;

}

.edit-btn{

background:#f59e0b;

color:white;

}

.remove-btn{

background:#ef4444;

color:white;

padding:6px 12px;

}

.post-box{

background:rgba(255,255,255,0.06);

padding:20px;

border-radius:20px;

margin-top:20px;

}

.staff-item{

display:flex;

justify-content:space-between;

align-items:center;

background:rgba(255,255,255,0.08);

padding:10px;

border-radius:10px;

margin-top:10px;

}

.event-card{

background:rgba(255,255,255,0.08);

padding:25px;

border-radius:20px;

margin-top:20px;

}

.status{

padding:8px 15px;

border-radius:10px;

display:inline-block;

margin-top:10px;

font-weight:bold;

}

.active{

background:#22c55e;

}

.expired{

background:#ef4444;

}

</style>

</head>

<body>

<div class="container">

<h1>
AAQ Event ERP
</h1>

<div class="form-box">

<div class="grid">

<input
type="text"
id="eventName"
placeholder="Event Name">

<input
type="text"
id="eventAddress"
placeholder="Event Address">

<input
type="date"
id="startDate">

<input
type="date"
id="endDate">

<input
type="text"
id="eventCoordinator"
placeholder="Event Coordinator">

<input
type="text"
id="accessManager"
placeholder="Access Manager">

<input
type="text"
id="technicalTeam"
placeholder="Technical Team">

</div>

<div id="postContainer"></div>

<button
class="add-btn"
onclick="addPost()">

+ Add Event Crew Post

</button>

<button
class="save-btn"
onclick="saveEvent()">

Save Event

</button>

</div>

<div id="eventList"></div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let currentEditId = null;

let totalPosts = 0;

window.addPost =
async function(){

totalPosts++;

const div =
document.createElement("div");

div.className =
"post-box";

div.innerHTML = `

<h2>
Crew Post ${totalPosts}
</h2>

<div class="grid">

<input
type="text"
class="crewPost"
placeholder="Crew Post">

<input
type="text"
class="dutyArea"
placeholder="Duty Area">

<input
type="text"
class="coordinator"
placeholder="Coordinator">

<select class="staffSelect"></select>

</div>

<button
class="add-btn"
onclick="addStaff(this)">

Add Staff

</button>

<div class="selectedStaffList"></div>

`;

document.getElementById(
"postContainer"
).appendChild(div);

const select =
div.querySelector(".staffSelect");

const querySnapshot =
await getDocs(
collection(db,"staffs")
);

let options =
"<option value=''>Select Staff</option>";

querySnapshot.forEach((docItem)=>{

const staff =
docItem.data();

options += `

<option value="${staff.email}">

${staff.staffName}
-
${staff.email}

</option>

`;

});

select.innerHTML =
options;

}

window.addStaff =
function(button){

const postBox =
button.closest(".post-box");

const select =
postBox.querySelector(".staffSelect");

const email =
select.value;

if(!email){

return;

}

const list =
postBox.querySelector(
".selectedStaffList"
);

const exists =
Array.from(
list.querySelectorAll(".staff-email")
).some(

item =>

item.innerText.trim()

===

email.trim()

);

if(exists){

alert(
"Already Added"
);

return;

}

list.innerHTML += `

<div class="staff-item">

<span class="staff-email">

${email}

</span>

<button
class="remove-btn"
onclick="removeStaff(this)">

Remove

</button>

</div>

`;

}

window.removeStaff =
function(button){

button.parentElement.remove();

}

window.saveEvent =
async function(){

const posts = [];

document.querySelectorAll(
".post-box"
).forEach((post)=>{

const emails = [];

post.querySelectorAll(
".staff-email"
).forEach((item)=>{

emails.push(
item.innerText.trim()
);

});

posts.push({

crewPost:
post.querySelector(".crewPost").value,

dutyArea:
post.querySelector(".dutyArea").value,

coordinator:
post.querySelector(".coordinator").value,

staffEmails:
emails

});

});

const eventData = {

eventName:
document.getElementById("eventName").value,

eventAddress:
document.getElementById("eventAddress").value,

startDate:
document.getElementById("startDate").value,

endDate:
document.getElementById("endDate").value,

eventCoordinator:
document.getElementById("eventCoordinator").value,

accessManager:
document.getElementById("accessManager").value,

technicalTeam:
document.getElementById("technicalTeam").value,

posts

};

try{

if(currentEditId){

await updateDoc(
doc(db,"events",currentEditId),
eventData
);

alert(
"Event Updated"
);

}else{

await addDoc(
collection(db,"events"),
eventData
);

alert(
"Event Saved"
);

}

currentEditId = null;

document.getElementById(
"postContainer"
).innerHTML = "";

addPost();

loadEvents();

}catch(error){

console.log(error);

alert(
"Save Failed"
);

}

}

window.editEvent =
async function(id){

currentEditId = id;

const querySnapshot =
await getDocs(
collection(db,"events")
);

querySnapshot.forEach((docItem)=>{

if(docItem.id === id){

const event =
docItem.data();

document.getElementById(
"eventName"
).value =
event.eventName;

document.getElementById(
"eventAddress"
).value =
event.eventAddress;

document.getElementById(
"startDate"
).value =
event.startDate;

document.getElementById(
"endDate"
).value =
event.endDate;

document.getElementById(
"eventCoordinator"
).value =
event.eventCoordinator;

document.getElementById(
"accessManager"
).value =
event.accessManager;

document.getElementById(
"technicalTeam"
).value =
event.technicalTeam;

}

});

}

window.loadEvents =
async function(){

const querySnapshot =
await getDocs(
collection(db,"events")
);

let html = "";

querySnapshot.forEach((docItem)=>{

const event =
docItem.data();

const id =
docItem.id;

const today =
new Date()
.toISOString()
.split("T")[0];

const status =
today > event.endDate

?

"Expired"

:

"Active";

html += `

<div class="event-card">

<h2>
${event.eventName}
</h2>

<p>
📍 ${event.eventAddress}
</p>

<p>
📅 ${event.startDate}
To
${event.endDate}
</p>

<p>
👨 ${event.eventCoordinator}
</p>

<p>
🛡️ ${event.accessManager}
</p>

<p>
🖥️ ${event.technicalTeam}
</p>

${event.posts.map(post=>`

<div class="staff-item">

<div>

<p>
💼 ${post.crewPost}
</p>

<p>
📍 ${post.dutyArea}
</p>

<p>
👨 ${post.coordinator}
</p>

<p>
👥 ${post.staffEmails.join(", ")}
</p>

</div>

</div>

`).join("")}

<div class="status
${status === "Active"
? "active"
: "expired"}">

${status}

</div>

<br>

<button
class="edit-btn"
onclick="editEvent('${id}')">

Edit Event

</button>

</div>

`;

});

document.getElementById(
"eventList"
).innerHTML =
html;

}

addPost();

loadEvents();

</script>

</body>

</html>
