<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Staff Attendance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#f8fafc,
#e0f2fe,
#fef9c3,
#ffffff
);

min-height:100vh;

padding:20px;

color:#0f172a;

}

.container{

max-width:900px;

margin:auto;

}

.top-card{

background:white;

padding:30px;

border-radius:30px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

margin-bottom:25px;

}

.profile{

display:flex;

align-items:center;

gap:20px;

flex-wrap:wrap;

}

.profile img{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:5px solid #facc15;

}

.live{

margin-top:20px;

padding:15px;

background:#f8fafc;

border-radius:15px;

line-height:1.8;

}

.btns{

display:flex;

gap:15px;

margin-top:25px;

flex-wrap:wrap;

}

.in-btn,
.out-btn{

flex:1;

padding:16px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:bold;

cursor:pointer;

color:white;

}

.in-btn{

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

}

.out-btn{

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

}

.history{

background:white;

padding:25px;

border-radius:25px;

box-shadow:
0 10px 30px rgba(0,0,0,0.08);

}

.filter{

margin-bottom:20px;

}

.filter input{

padding:12px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:16px;

}

.card{

background:#f8fafc;

padding:20px;

border-radius:20px;

margin-bottom:15px;

border-left:6px solid #facc15;

}

.status{

padding:8px 15px;

border-radius:10px;

display:inline-block;

font-weight:bold;

margin-top:10px;

}

.pending{

background:#fef3c7;

color:#92400e;

}

.approved{

background:#dcfce7;

color:#166534;

}

.rejected{

background:#fee2e2;

color:#991b1b;

}

</style>

</head>

<body>

<div class="container">

<div class="top-card">

<div class="profile">

<img
id="staffPhoto"
src="https://i.imgur.com/6VBx3io.png">

<div>

<h1 id="staffName">
Staff User
</h1>

<p id="staffPosition">
Staff Panel
</p>

</div>

</div>

<div class="live">

<div id="liveDate"></div>

<div id="liveTime"></div>

</div>

<div class="btns">

<button
onclick="markIn()"
class="in-btn">

IN Attendance

</button>

<button
onclick="markOut()"
class="out-btn">

OUT Attendance

</button>

</div>

</div>

<div class="history">

<h2 style="margin-bottom:20px;">
My Attendance
</h2>

<div class="filter">

<input
type="date"
id="filterDate"
onchange="loadAttendance()">

</div>

<div id="attendanceList">

</div>

</div>

</div>

<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
query,
where,
updateDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const staffName =
localStorage.getItem(
"staffName"
) || "Staff User";

const staffPhoto =
localStorage.getItem(
"staffPhoto"
);

const staffPosition =
localStorage.getItem(
"staffPosition"
) || "Staff Panel";

document.getElementById(
"staffName"
).innerHTML =
staffName;

document.getElementById(
"staffPosition"
).innerHTML =
staffPosition;

if(staffPhoto){

document.getElementById(
"staffPhoto"
).src =
staffPhoto;

}

function updateDateTime(){

const now = new Date();

document.getElementById(
"liveDate"
).innerHTML =
"📅 " +
now.toLocaleDateString();

document.getElementById(
"liveTime"
).innerHTML =
"🕒 " +
now.toLocaleTimeString();

}

setInterval(updateDateTime,1000);

updateDateTime();

window.markIn =
async function(){

const today =
new Date().toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today),
where("status","==","Working")
);

const check =
await getDocs(q);

if(!check.empty){

alert("OUT Attendance Pending");

return;

}

const now = new Date();

await addDoc(
collection(db,"attendance"),
{

staffName,
staffPhoto,
staffPosition,

date:
today,

inTime:
now.toLocaleTimeString(),

outTime:"",
totalHours:"",

status:"Pending"

}
);

alert("IN Attendance Marked");

loadAttendance();

}

window.markOut =
async function(){

const today =
new Date().toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const querySnapshot =
await getDocs(q);

if(querySnapshot.empty){

alert("IN Attendance Required");

return;

}

querySnapshot.forEach(async(item)=>{

const data =
item.data();

if(data.outTime){

return;

}

const outDate =
new Date();

const inDate =
new Date(
today + " " + data.inTime
);

const diff =
(outDate - inDate)
/ 1000 / 60 / 60;

const total =
diff.toFixed(1) + " Hours";

await updateDoc(
doc(db,"attendance",item.id),
{

outTime:
outDate.toLocaleTimeString(),

totalHours:
total,

status:
"Pending"

}
);

alert("OUT Attendance Marked");

loadAttendance();

});

}

window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(db,"attendance")
);

const selectedDate =
document.getElementById(
"filterDate"
).value;

let html = "";

querySnapshot.forEach((docItem)=>{

const data =
docItem.data();

if(data.staffName !== staffName){

return;

}

if(selectedDate){

const formatted =
new Date(selectedDate)
.toLocaleDateString();

if(data.date !== formatted){

return;

}

}

let statusClass =
"pending";

if(data.status === "Approved"){

statusClass =
"approved";

}

if(data.status === "Rejected"){

statusClass =
"rejected";

}

html += `

<div class="card">

<h3>
📅 ${data.date}
</h3>

<p>
🟢 IN :
${data.inTime || '--'}
</p>

<p>
🔴 OUT :
${data.outTime || '--'}
</p>

<p>
⏱️ Total :
${data.totalHours || '--'}
</p>

<div class="status ${statusClass}">

${data.status}

</div>

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML =
html;

}

loadAttendance();

</script>

</body>

</html>
