<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
AAQ Smart Attendance
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#111827
);

min-height:100vh;

padding:20px;

color:white;

}

.container{

max-width:1100px;

margin:auto;

}

.top-card{

background:
rgba(255,255,255,.08);

backdrop-filter:blur(12px);

padding:25px;

border-radius:25px;

margin-bottom:20px;

}

.profile{

display:flex;

align-items:center;

gap:20px;

flex-wrap:wrap;

}

.profile img{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:4px solid #22c55e;

}

.live{

margin-top:20px;

padding:15px;

background:
rgba(255,255,255,.05);

border-radius:15px;

line-height:1.8;

}

.camera-card{

background:
rgba(255,255,255,.08);

backdrop-filter:blur(12px);

padding:25px;

border-radius:25px;

margin-bottom:20px;

text-align:center;

}

video{

width:100%;

max-width:450px;

border-radius:20px;

border:3px solid #22c55e;

}

canvas{

display:none;

}

.status-box{

margin-top:15px;

padding:15px;

border-radius:15px;

background:#1f2937;

font-weight:bold;

}

.btns{

display:flex;

gap:15px;

margin-top:20px;

flex-wrap:wrap;

}

.face-in{

flex:1;

padding:16px;

border:none;

border-radius:15px;

background:
linear-gradient(
135deg,
#22c55e,
#15803d
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

.face-out{

flex:1;

padding:16px;

border:none;

border-radius:15px;

background:
linear-gradient(
135deg,
#ef4444,
#b91c1c
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

.history{

background:
rgba(255,255,255,.08);

padding:25px;

border-radius:25px;

backdrop-filter:blur(12px);

}

.card{

background:
rgba(255,255,255,.05);

padding:18px;

border-radius:18px;

margin-bottom:12px;

}

.location-box{

margin-top:15px;

padding:15px;

background:
rgba(255,255,255,.05);

border-radius:15px;

}

</style>

</head>

<body>

<div class="container">

<div class="top-card">

<div class="profile">

<img
id="staffPhoto"
src="https://i.imgur.com/6VBx3io.png">

<div>

<h1 id="staffName">
Staff User
</h1>

<p id="staffPosition">
Staff Panel
</p>

</div>

</div>

<div class="live">

<div id="liveDate"></div>

<div id="workingHours">

⏱ Working Time :
0 Hours

</div>

</div>

</div>

<div class="camera-card">

<h2>

📷 Face Attendance Verification

</h2>

<br>

<video
id="video"
autoplay
playsinline>
</video>

<canvas
id="canvas">
</canvas>

<div
id="statusBox"
class="status-box">

Waiting For Face Verification...

</div>

<div
id="locationBox"
class="location-box">

📍 Location Not Captured

</div>

<div class="btns">

<button
onclick="faceCheckIn()"
class="face-in">

✅ FACE IN

</button>

<button
onclick="faceCheckOut()"
class="face-out">

🚪 FACE OUT

</button>

</div>

</div>

<div class="history">

<h2>

Attendance History

</h2>

<br>

<div id="attendanceList">

</div>

</div>

</div>
<script type="module">

import { initializeApp }

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
query,
where,
updateDoc,
doc

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyC8oQaQ051U1lXafwdjjOo38t56WwsdBO4",

authDomain:
"aaq-event-erp.firebaseapp.com",

projectId:
"aaq-event-erp",

storageBucket:
"aaq-event-erp.firebasestorage.app",

messagingSenderId:
"985636664002",

appId:
"1:985636664002:web:4b941d3562609d2058815b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const currentUser =

JSON.parse(

localStorage.getItem(
"currentUser"
)

);

const staffName =

currentUser?.staffName ||
"Staff User";

const staffPhoto =

currentUser?.photoURL ||
"https://i.imgur.com/6VBx3io.png";

const staffPosition =

currentUser?.position ||
"Staff";

document.getElementById(
"staffName"
).innerHTML =
staffName;

document.getElementById(
"staffPosition"
).innerHTML =
staffPosition;

document.getElementById(
"staffPhoto"
).src =
staffPhoto;

document.getElementById(
"liveDate"
).innerHTML =

"📅 " +

new Date()
.toLocaleDateString();

const video =
document.getElementById(
"video"
);

const canvas =
document.getElementById(
"canvas"
);

const statusBox =
document.getElementById(
"statusBox"
);

const locationBox =
document.getElementById(
"locationBox"
);

let currentLat = "";
let currentLng = "";

navigator.mediaDevices
.getUserMedia({
video:true
})
.then(stream=>{

video.srcObject =
stream;

})
.catch(()=>{

statusBox.innerHTML =

"❌ Camera Permission Denied";

});

function getLocation(){

return new Promise((resolve)=>{

navigator.geolocation
.getCurrentPosition(

(position)=>{

currentLat =

position.coords.latitude;

currentLng =

position.coords.longitude;

locationBox.innerHTML =

"📍 Lat : " +

currentLat +

"<br>Lng : " +

currentLng;

resolve(true);

},

()=>{

locationBox.innerHTML =

"❌ Location Not Available";

resolve(false);

}

);

});

}

function capturePhoto(){

const ctx =

canvas.getContext("2d");

canvas.width =
video.videoWidth;

canvas.height =
video.videoHeight;

ctx.drawImage(

video,
0,
0,
canvas.width,
canvas.height

);

return canvas
.toDataURL(
"image/jpeg"
);

}

  window.faceCheckIn =
async function(){

statusBox.innerHTML =

"📷 Capturing Face...";

await getLocation();

const photoData =
capturePhoto();

const today =
new Date()
.toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const check =
await getDocs(q);

let alreadyIn = false;

check.forEach((docItem)=>{

const data =
docItem.data();

if(!data.outTime){

alreadyIn = true;

}

});

if(alreadyIn){

alert(
"OUT Attendance Pending"
);

return;

}

const now =
new Date();

await addDoc(
collection(db,"attendance"),
{

staffName,
staffPhoto,
staffPosition,

date:
today,

inTime:
now.toLocaleTimeString(),

outTime:"",

totalHours:"",

status:"Pending",

inPhoto:
photoData,

inLat:
currentLat,

inLng:
currentLng

}
);

statusBox.innerHTML =

"✅ FACE IN SUCCESSFUL";

alert(
"Face IN Attendance Marked"
);

loadAttendance();

};

window.loadAttendance =
async function(){

const querySnapshot =
await getDocs(
collection(db,"attendance")
);

let html = "";

querySnapshot.forEach((docItem)=>{

const data =
docItem.data();

if(
data.staffName !== staffName
){

return;

}

html += `

<div class="card">

<h3>

📅 ${data.date}

</h3>

<br>

<p>

🟢 IN :
${data.inTime || '--'}

</p>

<p>

🔴 OUT :
${data.outTime || '--'}

</p>

<p>

📍 IN Location :

${data.inLat || '--'}

,
${data.inLng || '--'}

</p>

<p>

⏱ Total :

${data.totalHours || 'Working...'}

</p>

<br>

<img
src="${data.inPhoto || ''}"
style="
width:120px;
height:120px;
object-fit:cover;
border-radius:15px;
">

</div>

`;

});

document.getElementById(
"attendanceList"
).innerHTML =
html;

};

loadAttendance();

  window.faceCheckOut =
async function(){

statusBox.innerHTML =

"📷 Verifying Face...";

await getLocation();

const photoData =
capturePhoto();

const today =
new Date()
.toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const querySnapshot =
await getDocs(q);

if(querySnapshot.empty){

alert(
"IN Attendance Required"
);

return;

}

querySnapshot.forEach(
async(item)=>{

const data =
item.data();

if(data.outTime){

return;

}

const outDate =
new Date();

const inDate =
new Date(
today + " " + data.inTime
);

const diff =
(outDate - inDate)
/1000/60/60;

const total =
diff.toFixed(2) +
" Hours";

await updateDoc(
doc(
db,
"attendance",
item.id
),
{

outTime:
outDate.toLocaleTimeString(),

totalHours:
total,

status:
"Pending",

outPhoto:
photoData,

outLat:
currentLat,

outLng:
currentLng

}
);

statusBox.innerHTML =

"✅ FACE OUT SUCCESSFUL";

alert(
"Face OUT Attendance Marked"
);

loadAttendance();

});

};

setInterval(
async()=>{

const today =
new Date()
.toLocaleDateString();

const q =
query(
collection(db,"attendance"),
where("staffName","==",staffName),
where("date","==",today)
);

const querySnapshot =
await getDocs(q);

querySnapshot.forEach(
(docItem)=>{

const data =
docItem.data();

if(!data.outTime){

const now =
new Date();

const inDate =
new Date(
today + " " + data.inTime
);

const diff =
(now - inDate)
/1000/60/60;

document.getElementById(
"workingHours"
).innerHTML =

"⏱ Working Time : " +

diff.toFixed(2) +

" Hours";

}

});

},60000);

</script>

</body>

</html>
